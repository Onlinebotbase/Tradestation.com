<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Profile - Trade Station</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{brand:{600:'#2563eb'},dark:{800:'#1f2937',900:'#111827',950:'#0b0f19'}}}}}</script>
  <style>body{background:#0b0f19;}</style>
</head>
<body class="text-white">
  <div id="ts-global-header"></div>
  <main class="pb-24 pt-2 px-4 max-w-lg mx-auto">
    <h1 class="text-lg font-bold mb-4">Profile</h1>
    <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-6 text-center mb-4">
      <div class="w-20 h-20 mx-auto mb-3 rounded-full bg-brand-600 flex items-center justify-center text-2xl font-bold text-white" id="profile-initials">--</div>
      <div class="text-lg font-bold text-white" id="profile-name">--</div>
      <div class="text-sm text-gray-400" id="profile-email">--</div>
    </div>
    <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-4 space-y-3 mb-4">
      <div class="flex justify-between items-center"><span class="text-sm text-gray-400">User ID</span><span class="text-sm font-mono font-bold text-white" id="profile-id">--</span></div>
      <div class="flex justify-between items-center"><span class="text-sm text-gray-400">Account Type</span><span class="text-sm font-bold text-green-400">Real Account</span></div>
      <div class="flex justify-between items-center"><span class="text-sm text-gray-400">Email</span><span class="text-sm font-bold text-white" id="profile-email2">--</span></div>
      <div class="flex justify-between items-center"><span class="text-sm text-gray-400">Password</span><span class="text-sm font-bold text-white">••••••••</span></div>
    </div>
    <button onclick="location.href='settings.html'" class="w-full py-3 bg-brand-600 hover:bg-brand-700 text-white font-bold rounded-xl">Edit Profile</button>
  </main>
  <div id="ts-global-footer"></div>
  <script src="app.js"></script>
  <script>
    if (!TS_Auth.requireAuth()) throw new Error('Auth required');
    const user = TS_Auth.getUser();
    document.getElementById('profile-name').textContent = user.firstName + ' ' + user.lastName;
    document.getElementById('profile-email').textContent = user.email;
    document.getElementById('profile-email2').textContent = user.email;
    document.getElementById('profile-id').textContent = user.userId;
    document.getElementById('profile-initials').textContent = (user.firstName[0] + user.lastName[0]).toUpperCase();
  </script>
</body>
</html>
