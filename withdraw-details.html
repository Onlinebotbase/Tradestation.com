<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Withdraw Details - Trade Station</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{brand:{600:'#2563eb'},dark:{800:'#1f2937',900:'#111827',950:'#0b0f19'}}}}}</script>
  <style>body{background:#0b0f19;}</style>
</head>
<body class="text-white">
  <div id="ts-global-header"></div>
  <main class="pb-24 pt-2 px-4 max-w-lg mx-auto">
    <h1 class="text-lg font-bold mb-4">On-Chain Withdrawal</h1>
    <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-4 mb-4">
      <div class="text-xs text-gray-400 mb-1">Available Balance</div>
      <div class="text-2xl font-bold text-white" id="avail-balance">$0.00</div>
    </div>
    <form id="withdraw-form" class="space-y-4">
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1">Withdrawal Address</label>
        <div class="flex gap-2">
          <input type="text" id="address" required class="flex-1 px-3 py-2.5 bg-dark-800 border border-gray-700 rounded-lg text-white text-sm focus:outline-none focus:border-brand-600" placeholder="0x... or T...">
          <button type="button" onclick="fillWallet()" class="px-3 py-2 bg-gray-700 text-white text-xs font-bold rounded-lg whitespace-nowrap">Fill Wallet</button>
        </div>
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1">Network</label>
        <select id="network" class="w-full px-3 py-2.5 bg-dark-800 border border-gray-700 rounded-lg text-white text-sm focus:outline-none focus:border-brand-600">
          <option>Ethereum (ERC-20)</option>
          <option>Bitcoin (BTC)</option>
          <option>BNB Smart Chain (BEP-20)</option>
          <option>Tron (TRC-20)</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1">Amount ($)</label>
        <div class="flex gap-2">
          <input type="number" id="amount" required min="10" class="flex-1 px-3 py-2.5 bg-dark-800 border border-gray-700 rounded-lg text-white text-sm focus:outline-none focus:border-brand-600" placeholder="Min $10">
          <button type="button" onclick="document.getElementById('amount').value = Math.max(0, TS_Balance.get() - 0.114).toFixed(2)" class="px-3 py-2 bg-gray-700 text-white text-xs font-bold rounded-lg">Max</button>
        </div>
      </div>
      <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-3 flex justify-between text-sm">
        <span class="text-gray-400">Gas Fee</span>
        <span class="text-white font-bold">0.114 BNB</span>
      </div>
      <button type="submit" class="w-full py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl transition-all">Withdraw</button>
    </form>
  </main>
  <div id="ts-global-footer"></div>
  <script src="app.js"></script>
  <script>
    if (!TS_Auth.requireAuth()) throw new Error('Auth required');
    document.getElementById('avail-balance').textContent = '$' + TS_Balance.get().toFixed(2);
    function fillWallet() { document.getElementById('address').value = '0xAB98294614C46008cBF82Fa3e25285FBC2A6F257'; }
    document.getElementById('withdraw-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const amount = parseFloat(document.getElementById('amount').value);
      if (!amount || amount < 10) { TS_UI.showToast('Minimum withdrawal is $10', 'warning'); return; }
      if (amount > TS_Balance.get()) { TS_UI.showToast('Insufficient balance', 'error'); return; }
      TS_DB.set('pending_withdraw', {
        amount,
        address: document.getElementById('address').value,
        network: document.getElementById('network').value
      });
      location.href = 'withdraw-confirmation.html';
    });
  </script>
</body>
</html>
