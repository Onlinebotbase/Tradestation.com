<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Deposit - Trade Station</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{brand:{600:'#2563eb'},dark:{800:'#1f2937',900:'#111827',950:'#0b0f19'}}}}}</script>
  <style>body{background:#0b0f19;}</style>
</head>
<body class="text-white">
  <div id="ts-global-header"></div>
  <main class="pb-24 pt-2 px-4 max-w-lg mx-auto">
    <h1 class="text-lg font-bold mb-4">Deposit Funds</h1>
    <p class="text-sm text-gray-400 mb-4">Select your preferred deposit method.</p>
    <div class="space-y-3">
      <button onclick="location.href='deposit-bank.html'" class="w-full bg-dark-800 border border-gray-700/50 rounded-xl p-4 flex items-center gap-4 hover:border-brand-500/50 transition-colors text-left">
        <div class="w-12 h-12 rounded-full bg-blue-500/10 flex items-center justify-center text-blue-400">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
        </div>
        <div>
          <div class="text-sm font-bold text-white">Bank Transfer</div>
          <div class="text-xs text-gray-400">Wire transfer or SEPA</div>
        </div>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="ml-auto text-gray-500"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </button>
      <button onclick="location.href='deposit-coin-selection.html'" class="w-full bg-dark-800 border border-gray-700/50 rounded-xl p-4 flex items-center gap-4 hover:border-brand-500/50 transition-colors text-left">
        <div class="w-12 h-12 rounded-full bg-orange-500/10 flex items-center justify-center text-orange-400">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
        </div>
        <div>
          <div class="text-sm font-bold text-white">Cryptocurrency</div>
          <div class="text-xs text-gray-400">USDT, ETH, BNB, TRX</div>
        </div>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="ml-auto text-gray-500"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </button>
    </div>
  </main>
  <div id="ts-global-footer"></div>
  <script src="app.js"></script>
  <script>if (!TS_Auth.requireAuth()) throw new Error('Auth required');</script>
</body>
</html>
