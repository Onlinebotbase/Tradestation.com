<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dashboard - Trade Station</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 900: '#1e3a5f' },
            dark: { 800: '#1f2937', 900: '#111827', 950: '#0b0f19' }
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0b0f19; }
    .pulse-dot { animation: pulse-dot 2s infinite; }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body class="text-white">
  <div id="ts-global-header"></div>

  <!-- Welcome Banner -->
  <div id="ts-welcome-banner" class="bg-gradient-to-r from-brand-600 to-purple-600 text-white px-4 py-3 text-sm font-medium flex items-center justify-between">
    <span>Welcome to Trade Station! Your Real Account is ready.</span>
    <button class="ts-dismiss p-1 hover:bg-white/20 rounded">✕</button>
  </div>

  <main class="pb-24 pt-2 px-4 max-w-lg mx-auto">
    <!-- Account Info -->
    <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-4 mb-4">
      <div class="flex items-center justify-between mb-2">
        <span class="text-xs text-gray-400">Account ID</span>
        <span class="text-xs px-2 py-0.5 rounded-full bg-green-500/10 text-green-400 font-medium">Real Account</span>
      </div>
      <div class="text-lg font-mono font-bold text-white mb-3" id="account-id">--</div>
      <div class="border-t border-gray-700 pt-3">
        <span class="text-xs text-gray-400">Total Balance</span>
        <div class="text-3xl font-extrabold text-white" id="total-balance">$0.00</div>
        <div class="flex items-center gap-2 mt-1">
          <span class="w-2 h-2 rounded-full bg-green-400 pulse-dot"></span>
          <span class="text-xs text-green-400">Live Updates Active</span>
        </div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="grid grid-cols-4 gap-3 mb-4">
      <button onclick="location.href='deposit-options.html'" class="flex flex-col items-center gap-1.5 p-3 bg-dark-800 border border-gray-700/50 rounded-xl hover:border-brand-500/50 transition-colors">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
        <span class="text-[10px] text-gray-300">Deposit</span>
      </button>
      <button onclick="location.href='withdraw-options.html'" class="flex flex-col items-center gap-1.5 p-3 bg-dark-800 border border-gray-700/50 rounded-xl hover:border-brand-500/50 transition-colors">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
        <span class="text-[10px] text-gray-300">Withdraw</span>
      </button>
      <button onclick="location.href='order-ticket.html'" class="flex flex-col items-center gap-1.5 p-3 bg-dark-800 border border-gray-700/50 rounded-xl hover:border-brand-500/50 transition-colors">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
        <span class="text-[10px] text-gray-300">Order</span>
      </button>
      <button onclick="location.href='holding.html'" class="flex flex-col items-center gap-1.5 p-3 bg-dark-800 border border-gray-700/50 rounded-xl hover:border-brand-500/50 transition-colors">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
        <span class="text-[10px] text-gray-300">Hold</span>
      </button>
    </div>

    <!-- Quick Transfer -->
    <button onclick="location.href='transfer.html'" class="w-full mb-4 py-2.5 bg-dark-800 border border-gray-700/50 rounded-xl text-sm text-gray-300 hover:text-white hover:border-gray-600 transition-colors flex items-center justify-center gap-2">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 1l4 4-4 4"></path><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><path d="M7 23l-4-4 4-4"></path><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
      Transfer Funds
    </button>

    <!-- Ongoing Trades -->
    <div class="mb-4">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-sm font-bold text-gray-300">Active Trades</h2>
        <a href="trade.html" class="text-xs text-brand-400">View All</a>
      </div>
      <div id="trades-list" class="space-y-2">
        <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-4 text-center text-sm text-gray-500">No active trades</div>
      </div>
    </div>

    <!-- Active Holdings -->
    <div class="mb-4">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-sm font-bold text-gray-300">Active Holdings</h2>
        <a href="holding.html" class="text-xs text-brand-400">View All</a>
      </div>
      <div id="holdings-list" class="space-y-2">
        <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-4 text-center text-sm text-gray-500">No active holdings</div>
      </div>
    </div>

    <!-- Save Account -->
    <button onclick="saveAccount()" class="w-full py-3 bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-xl text-sm font-semibold text-gray-300 transition-colors">
      Save Account to Local Storage
    </button>
  </main>

  <div id="ts-global-footer"></div>

  <script src="app.js"></script>
  <script>
    if (!TS_Auth.requireAuth()) throw new Error('Auth required');

    const user = TS_Auth.getUser();
    document.getElementById('account-id').textContent = user.userId;

    function updateDashboard() {
      const balance = TS_Balance.get();
      document.getElementById('total-balance').textContent = '$' + balance.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

      const trades = TS_Invest.getTrades().filter(t => t.status === 'active');
      const tradesList = document.getElementById('trades-list');
      if (trades.length === 0) {
        tradesList.innerHTML = '<div class="bg-dark-800 border border-gray-700/50 rounded-xl p-4 text-center text-sm text-gray-500">No active trades</div>';
      } else {
        tradesList.innerHTML = trades.slice(0, 3).map(t => {
          const liveVal = TS_Invest.calculateLiveValue(t);
          const profit = liveVal - t.amount;
          const profitClass = profit >= 0 ? 'text-green-400' : 'text-red-400';
          return `
            <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-3 flex items-center justify-between">
              <div>
                <div class="text-sm font-bold text-white">${t.symbol.toUpperCase()}</div>
                <div class="text-xs text-gray-400">${t.orderType} | ${t.direction.toUpperCase()}</div>
              </div>
              <div class="text-right">
                <div class="text-sm font-bold ${profitClass}">$${liveVal.toFixed(2)}</div>
                <div class="text-xs ${profitClass}">${profit >= 0 ? '+' : ''}$${profit.toFixed(2)}</div>
              </div>
            </div>
          `;
        }).join('');
      }

      const holdings = TS_Invest.getHoldings().filter(h => h.status === 'active');
      const holdingsList = document.getElementById('holdings-list');
      if (holdings.length === 0) {
        holdingsList.innerHTML = '<div class="bg-dark-800 border border-gray-700/50 rounded-xl p-4 text-center text-sm text-gray-500">No active holdings</div>';
      } else {
        holdingsList.innerHTML = holdings.slice(0, 3).map(h => {
          const liveVal = TS_Invest.calculateLiveValue(h);
          const profit = liveVal - h.amount;
          return `
            <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-3 flex items-center justify-between">
              <div>
                <div class="text-sm font-bold text-white">${h.symbol.toUpperCase()}</div>
                <div class="text-xs text-gray-400">${h.planName || 'Holding'} | ${h.dailyReturnRate}%/day</div>
              </div>
              <div class="text-right">
                <div class="text-sm font-bold text-green-400">$${liveVal.toFixed(2)}</div>
                <div class="text-xs text-green-400">+$${profit.toFixed(2)}</div>
              </div>
            </div>
          `;
        }).join('');
      }
    }

    function saveAccount() {
      const u = TS_Auth.getUser();
      let users = TS_DB.get('users', []);
      const idx = users.findIndex(x => x.userId === u.userId);
      if (idx >= 0) users[idx] = u; else users.push(u);
      TS_DB.set('users', users);
      TS_UI.showToast('Account saved successfully', 'success');
    }

    updateDashboard();
    setInterval(updateDashboard, 1000);
  </script>
</body>
</html>
