<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Quotes - Trade Station</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brand: { 600: '#2563eb' }, dark: { 800: '#1f2937', 900: '#111827', 950: '#0b0f19' } } } } }</script>
  <style>body { background: #0b0f19; }</style>
</head>
<body class="text-white">
  <div id="ts-global-header"></div>
  <main class="pb-24 pt-2 px-4 max-w-lg mx-auto">
    <h1 class="text-lg font-bold mb-4">Quotes</h1>
    <div id="quotes-search" class="mb-4">
      <input type="text" id="search-input" placeholder="Search symbols..." class="w-full px-3 py-2 bg-dark-800 border border-gray-700 rounded-lg text-sm text-white focus:outline-none focus:border-brand-600">
    </div>
    <div id="quotes-list" class="space-y-2"></div>
    <div id="no-quotes" class="hidden text-center py-8 text-gray-500 text-sm">
      <p>No symbols in watchlist.</p>
      <button onclick="location.href='symbol.html'" class="mt-2 text-brand-400 text-sm font-semibold">Add Symbols</button>
    </div>
  </main>
  <div id="ts-global-footer"></div>
  <script src="app.js"></script>
  <script>
    if (!TS_Auth.requireAuth()) throw new Error('Auth required');
    const quotes = TS_DB.get('watchlist', []);
    const list = document.getElementById('quotes-list');
    const noQuotes = document.getElementById('no-quotes');

    async function renderQuotes(filter = '') {
      let display = quotes;
      if (filter) display = quotes.filter(q => q.symbol.toLowerCase().includes(filter.toLowerCase()) || q.name.toLowerCase().includes(filter.toLowerCase()));
      if (display.length === 0) { list.innerHTML = ''; noQuotes.classList.remove('hidden'); return; }
      noQuotes.classList.add('hidden');
      
      const coins = await TS_Market.getCoins();
      list.innerHTML = display.map(q => {
        const coin = coins.find(c => c.symbol.toLowerCase() === q.symbol.toLowerCase());
        const price = coin ? coin.current_price : q.price || 0;
        const change = coin ? coin.price_change_percentage_24h : 0;
        const color = change >= 0 ? 'text-green-400' : 'text-red-400';
        return `
          <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-3 flex items-center justify-between cursor-pointer" onclick="showQuoteMenu('${q.symbol}', '${q.name || q.symbol}')">
            <div class="flex items-center gap-3">
              ${coin?.image ? `<img src="${coin.image}" class="w-8 h-8 rounded-full">` : '<div class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center text-xs font-bold">' + q.symbol[0].toUpperCase() + '</div>'}
              <div>
                <div class="text-sm font-bold text-white">${q.symbol.toUpperCase()}</div>
                <div class="text-xs text-gray-400">${q.name || q.symbol}</div>
              </div>
            </div>
            <div class="text-right">
              <div class="text-sm font-bold text-white">$${price ? price.toLocaleString() : '--'}</div>
              <div class="text-xs ${color}">${change >= 0 ? '+' : ''}${change ? change.toFixed(2) : '0.00'}%</div>
            </div>
          </div>
        `;
      }).join('');
    }

    function showQuoteMenu(symbol, name) {
      TS_UI.showModal(symbol.toUpperCase(), 'Choose an action:', [
        { text: 'New Order', primary: true, onClick: () => { TS_DB.set('selected_symbol', { symbol, name }); location.href = 'order-ticket.html'; } },
        { text: 'Chart', onClick: () => { TS_DB.set('chart_symbol', symbol); location.href = 'charts.html'; } },
        { text: 'Market Stats', onClick: () => { TS_DB.set('stats_symbol', symbol); location.href = 'market-statistics.html'; } },
        { text: 'Remove', onClick: () => { const wl = TS_DB.get('watchlist', []).filter(x => x.symbol !== symbol); TS_DB.set('watchlist', wl); renderQuotes(); } }
      ]);
    }

    document.getElementById('search-input').addEventListener('input', e => renderQuotes(e.target.value));
    renderQuotes();
  </script>
</body>
</html>
