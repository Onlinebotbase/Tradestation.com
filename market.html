<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Market - Trade Station</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{brand:{600:'#2563eb'},dark:{800:'#1f2937',900:'#111827',950:'#0b0f19'}}}}}</script>
  <style>body{background:#0b0f19;}</style>
</head>
<body class="text-white">
  <div id="ts-global-header"></div>
  <main class="pb-24 pt-2 px-4 max-w-lg mx-auto">
    <h1 class="text-lg font-bold mb-4">Market Overview</h1>
    <!-- Overview Widget -->
    <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-4 mb-4">
      <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js">
        {
          "colorTheme": "dark",
          "dateRange": "1D",
          "showChart": true,
          "locale": "en",
          "largeChartUrl": "",
          "isTransparent": true,
          "showSymbolLogo": true,
          "showFloatingTooltip": true,
          "width": "100%",
          "height": "300",
          "plotLineColorGrowing": "#22c55e",
          "plotLineColorFalling": "#ef4444",
          "gridLineColor": "#374151",
          "scaleFontColor": "#9ca3af",
          "belowLineFillColorGrowing": "rgba(34,197,94,0.1)",
          "belowLineFillColorFalling": "rgba(239,68,68,0.1)",
          "tabs": [
            { "title": "Crypto", "symbols": [{"s":"COINBASE:BTCUSD"},{"s":"COINBASE:ETHUSD"},{"s":"BINANCE:SOLUSD"},{"s":"BINANCE:BNBUSD"}] },
            { "title": "Forex", "symbols": [{"s":"FX:EURUSD"},{"s":"FX:GBPUSD"},{"s":"FX:USDJPY"},{"s":"FX:AUDUSD"}] }
          ]
        }
        </script>
      </div>
    </div>

    <!-- Gainers & Losers -->
    <div class="grid grid-cols-2 gap-3 mb-4">
      <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-3">
        <div class="text-xs text-gray-400 mb-2">Top Gainers</div>
        <div id="gainers-list" class="space-y-2"></div>
      </div>
      <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-3">
        <div class="text-xs text-gray-400 mb-2">Top Losers</div>
        <div id="losers-list" class="space-y-2"></div>
      </div>
    </div>

    <!-- Trending -->
    <div class="mb-4">
      <div class="text-xs text-gray-400 mb-2">Trending</div>
      <div id="trending-list" class="flex gap-2 overflow-x-auto pb-2"></div>
    </div>

    <!-- All Prices -->
    <div class="mb-4">
      <div class="flex items-center justify-between mb-2">
        <div class="text-xs text-gray-400">Live Prices</div>
        <div class="text-xs text-green-400 flex items-center gap-1"><span class="w-1.5 h-1.5 bg-green-400 rounded-full animate-pulse"></span>Live</div>
      </div>
      <div id="prices-list" class="space-y-2"></div>
    </div>
  </main>
  <div id="ts-global-footer"></div>
  <script src="app.js"></script>
  <script>
    if (!TS_Auth.requireAuth()) throw new Error('Auth required');
    async function loadMarket() {
      const coins = await TS_Market.getCoins();
      const sorted = [...coins].sort((a, b) => b.price_change_percentage_24h - a.price_change_percentage_24h);
      const gainers = sorted.slice(0, 5);
      const losers = sorted.slice(-5).reverse();
      
      document.getElementById('gainers-list').innerHTML = gainers.map(c => `
        <div class="flex items-center justify-between">
          <span class="text-xs text-white font-bold">${c.symbol.toUpperCase()}</span>
          <span class="text-xs text-green-400">+${c.price_change_percentage_24h?.toFixed(2)}%</span>
        </div>
      `).join('');
      
      document.getElementById('losers-list').innerHTML = losers.map(c => `
        <div class="flex items-center justify-between">
          <span class="text-xs text-white font-bold">${c.symbol.toUpperCase()}</span>
          <span class="text-xs text-red-400">${c.price_change_percentage_24h?.toFixed(2)}%</span>
        </div>
      `).join('');
      
      document.getElementById('trending-list').innerHTML = coins.slice(0, 10).map(c => `
        <div onclick="TS_DB.set('chart_symbol','${c.symbol}');location.href='charts.html'" class="snap-start min-w-[100px] bg-dark-800 border border-gray-700/50 rounded-xl p-2 text-center cursor-pointer">
          <img src="${c.image}" class="w-8 h-8 rounded-full mx-auto mb-1" onerror="this.style.display='none'">
          <div class="text-xs font-bold text-white">${c.symbol.toUpperCase()}</div>
          <div class="text-xs ${c.price_change_percentage_24h >= 0 ? 'text-green-400' : 'text-red-400'}">${c.price_change_percentage_24h?.toFixed(1)}%</div>
        </div>
      `).join('');
      
      document.getElementById('prices-list').innerHTML = coins.slice(0, 20).map(c => `
        <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-3 flex items-center justify-between">
          <div class="flex items-center gap-2">
            <img src="${c.image}" class="w-6 h-6 rounded-full" onerror="this.style.display='none'">
            <span class="text-sm font-bold text-white">${c.symbol.toUpperCase()}</span>
          </div>
          <div class="text-right">
            <div class="text-sm font-bold text-white">$${c.current_price?.toLocaleString()}</div>
            <div class="text-xs ${c.price_change_percentage_24h >= 0 ? 'text-green-400' : 'text-red-400'}">${c.price_change_percentage_24h?.toFixed(2)}%</div>
          </div>
        </div>
      `).join('');
    }
    loadMarket();
    setInterval(loadMarket, 30000);
  </script>
</body>
</html>
