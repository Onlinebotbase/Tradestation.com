<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Charts - TradeStation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --mt5-bg: #0d0d0d;
            --mt5-panel: #1a1a1a;
            --mt5-border: #2a2a2a;
            --mt5-text: #d1d4dc;
            --mt5-text-dim: #6b7280;
            --mt5-accent: #2962ff;
            --mt5-buy: #089981;
            --mt5-sell: #f23645;
            --mt5-hover: #2a2e39;
            --mt5-toolbar: #131722;
            --mt5-input-bg: #0d0d0d;
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            background: var(--mt5-bg);
            color: var(--mt5-text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: var(--mt5-bg); }
        ::-webkit-scrollbar-thumb { background: #404040; border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: #505050; }
        
        /* MT5 Layout */
        .mt5-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            background: var(--mt5-bg);
        }
        
        /* Top Bar - Account/Status */
        .mt5-topbar {
            height: 28px;
            background: var(--mt5-toolbar);
            border-bottom: 1px solid var(--mt5-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            font-size: 11px;
            color: var(--mt5-text-dim);
            flex-shrink: 0;
            z-index: 100;
        }
        
        /* Toolbar */
        .mt5-toolbar {
            height: 36px;
            background: var(--mt5-toolbar);
            border-bottom: 1px solid var(--mt5-border);
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 0 4px;
            flex-shrink: 0;
            overflow-x: auto;
            scrollbar-width: none;
        }
        
        .mt5-toolbar::-webkit-scrollbar { display: none; }
        
        .mt5-tool-btn {
            height: 28px;
            padding: 0 10px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 3px;
            color: var(--mt5-text);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            transition: all 0.15s;
        }
        
        .mt5-tool-btn:hover {
            background: var(--mt5-hover);
            border-color: var(--mt5-border);
        }
        
        .mt5-tool-btn.active {
            background: var(--mt5-accent);
            color: #fff;
            border-color: var(--mt5-accent);
        }
        
        .mt5-tool-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
            flex-shrink: 0;
        }
        
        /* Main Workspace */
        .mt5-workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        
        /* Market Watch Panel */
        .mt5-marketwatch {
            width: 280px;
            min-width: 240px;
            max-width: 340px;
            background: var(--mt5-panel);
            border-right: 1px solid var(--mt5-border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 60;
        }
        
        .mt5-panel-header {
            height: 32px;
            background: var(--mt5-toolbar);
            border-bottom: 1px solid var(--mt5-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--mt5-text-dim);
            flex-shrink: 0;
        }
        
        .mt5-symbol-search {
            padding: 6px 8px;
            border-bottom: 1px solid var(--mt5-border);
            flex-shrink: 0;
        }
        
        .mt5-symbol-search input {
            width: 100%;
            height: 26px;
            background: var(--mt5-input-bg);
            border: 1px solid var(--mt5-border);
            border-radius: 3px;
            padding: 0 8px;
            color: var(--mt5-text);
            font-size: 11px;
            outline: none;
        }
        
        .mt5-symbol-search input:focus {
            border-color: var(--mt5-accent);
        }
        
        .mt5-symbol-list {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }
        
        .mt5-alpha-section {
            padding: 4px 10px;
            background: rgba(41, 98, 255, 0.08);
            font-size: 10px;
            font-weight: 700;
            color: var(--mt5-accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--mt5-border);
            position: sticky;
            top: 0;
            z-index: 2;
        }
        
        .mt5-symbol-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 7px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            cursor: pointer;
            transition: background 0.1s;
            font-size: 11px;
        }
        
        .mt5-symbol-item:hover {
            background: var(--mt5-hover);
        }
        
        .mt5-symbol-item.active {
            background: rgba(41, 98, 255, 0.12);
            border-left: 2px solid var(--mt5-accent);
        }
        
        .mt5-symbol-name {
            font-weight: 600;
            color: var(--mt5-text);
            font-size: 11px;
        }
        
        .mt5-symbol-type {
            font-size: 9px;
            color: var(--mt5-text-dim);
            text-transform: uppercase;
            margin-top: 1px;
        }
        
        .mt5-symbol-price {
            text-align: right;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            font-weight: 600;
        }
        
        .mt5-price-up { color: var(--mt5-buy); }
        .mt5-price-down { color: var(--mt5-sell); }
        
        .mt5-symbol-spread {
            font-size: 9px;
            color: var(--mt5-text-dim);
            text-align: right;
            margin-top: 1px;
        }
        
        /* Chart Area - FULL SIZE */
        .mt5-chart-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--mt5-bg);
            position: relative;
            min-width: 0;
            height: 100%;
        }
        
        /* Chart Header */
        .mt5-chart-header {
            height: 36px;
            background: var(--mt5-toolbar);
            border-bottom: 1px solid var(--mt5-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8px;
            flex-shrink: 0;
            gap: 8px;
        }
        
        .mt5-chart-tabs {
            display: flex;
            gap: 1px;
            overflow-x: auto;
            scrollbar-width: none;
            flex: 1;
        }
        
        .mt5-chart-tabs::-webkit-scrollbar { display: none; }
        
        .mt5-chart-tab {
            height: 28px;
            padding: 0 12px;
            background: transparent;
            border: none;
            border-radius: 3px;
            color: var(--mt5-text-dim);
            font-size: 11px;
            cursor: pointer;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.15s;
        }
        
        .mt5-chart-tab:hover { 
            color: var(--mt5-text); 
            background: var(--mt5-hover); 
        }
        
        .mt5-chart-tab.active {
            background: var(--mt5-accent);
            color: #fff;
        }
        
        .mt5-chart-tab svg {
            width: 12px;
            height: 12px;
            fill: currentColor;
            flex-shrink: 0;
        }
        
        /* Timeframe Bar */
        .mt5-timeframe-bar {
            height: 32px;
            background: var(--mt5-panel);
            border-bottom: 1px solid var(--mt5-border);
            display: flex;
            align-items: center;
            gap: 1px;
            padding: 0 6px;
            flex-shrink: 0;
            overflow-x: auto;
        }
        
        .mt5-timeframe-bar::-webkit-scrollbar { display: none; }
        
        .mt5-tf-btn {
            height: 22px;
            min-width: 32px;
            padding: 0 6px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 3px;
            color: var(--mt5-text-dim);
            font-size: 10px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .mt5-tf-btn:hover {
            background: var(--mt5-hover);
            color: var(--mt5-text);
        }
        
        .mt5-tf-btn.active {
            background: var(--mt5-accent);
            color: #fff;
            border-color: var(--mt5-accent);
        }
        
        /* Chart Widget Container - FULL HEIGHT */
        .mt5-chart-widget {
            flex: 1;
            position: relative;
            background: var(--mt5-bg);
            min-height: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        /* Widget Panels */
        .mt5-widget-panel {
            display: none;
            width: 100%;
            height: 100%;
            background: var(--mt5-bg);
        }
        
        .mt5-widget-panel.active { 
            display: block; 
        }
        
        #tradingview_chart {
            width: 100%;
            height: 100%;
        }
        
        /* One-Click Trading Panel */
        .mt5-oct-panel {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 190px;
            background: rgba(19, 23, 34, 0.96);
            border: 1px solid var(--mt5-border);
            border-radius: 4px;
            padding: 12px;
            backdrop-filter: blur(10px);
            z-index: 50;
            box-shadow: 0 4px 24px rgba(0,0,0,0.6);
            display: none;
        }
        
        .mt5-oct-panel.visible {
            display: block;
        }
        
        .mt5-oct-title {
            font-size: 10px;
            color: var(--mt5-text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            text-align: center;
            border-bottom: 1px solid var(--mt5-border);
            padding-bottom: 6px;
            font-weight: 600;
        }
        
        .mt5-oct-price {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            margin-bottom: 8px;
        }
        
        .mt5-oct-spread {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--mt5-text-dim);
            margin-bottom: 10px;
            padding: 4px 0;
            border-top: 1px solid var(--mt5-border);
            border-bottom: 1px solid var(--mt5-border);
        }
        
        .mt5-volume-control {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
        }
        
        .mt5-vol-btn {
            width: 28px;
            height: 28px;
            background: var(--mt5-hover);
            border: 1px solid var(--mt5-border);
            border-radius: 3px;
            color: var(--mt5-text);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            transition: all 0.15s;
        }
        
        .mt5-vol-btn:hover { 
            background: var(--mt5-border); 
            border-color: #404040;
        }
        
        .mt5-vol-btn svg {
            width: 14px;
            height: 14px;
        }
        
        .mt5-vol-display {
            flex: 1;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            background: var(--mt5-bg);
            border: 1px solid var(--mt5-border);
            border-radius: 3px;
            padding: 4px 0;
            color: var(--mt5-text);
        }
        
        .mt5-trade-btn {
            width: 100%;
            height: 34px;
            border: none;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 6px;
            transition: all 0.15s;
        }
        
        .mt5-trade-btn:hover { 
            filter: brightness(1.15); 
            transform: translateY(-1px);
        }
        
        .mt5-trade-btn:active {
            transform: translateY(0);
        }
        
        .mt5-btn-buy {
            background: var(--mt5-buy);
            color: #fff;
        }
        
        .mt5-btn-sell {
            background: var(--mt5-sell);
            color: #fff;
        }
        
        .mt5-btn-order {
            background: var(--mt5-hover);
            color: var(--mt5-text);
            border: 1px solid var(--mt5-border);
            font-weight: 500;
            font-size: 11px;
            height: 30px;
        }
        
        .mt5-btn-order:hover { 
            background: var(--mt5-border); 
        }
        
        /* Bottom Status Bar */
        .mt5-statusbar {
            height: 24px;
            background: var(--mt5-toolbar);
            border-top: 1px solid var(--mt5-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            font-size: 10px;
            color: var(--mt5-text-dim);
            flex-shrink: 0;
        }
        
        .mt5-status-left, .mt5-status-right {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        
        .mt5-status-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .mt5-status-online {
            width: 6px;
            height: 6px;
            background: var(--mt5-buy);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Indicators Panel */
        .mt5-indicators-panel {
            position: absolute;
            left: 8px;
            top: 8px;
            width: 220px;
            max-height: 320px;
            background: rgba(19, 23, 34, 0.96);
            border: 1px solid var(--mt5-border);
            border-radius: 4px;
            backdrop-filter: blur(10px);
            z-index: 50;
            overflow: hidden;
            display: none;
            box-shadow: 0 4px 24px rgba(0,0,0,0.6);
        }
        
        .mt5-indicators-panel.visible { 
            display: block; 
        }
        
        .mt5-ind-list {
            max-height: 280px;
            overflow-y: auto;
        }
        
        .mt5-ind-item {
            padding: 9px 12px;
            font-size: 11px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.1s;
            color: var(--mt5-text);
        }
        
        .mt5-ind-item:hover { 
            background: var(--mt5-hover); 
        }
        
        .mt5-ind-item svg {
            width: 14px;
            height: 14px;
            fill: var(--mt5-text-dim);
            flex-shrink: 0;
        }
        
        /* Mobile Toggle */
        .mt5-mobile-toggle {
            display: none;
            position: fixed;
            bottom: 36px;
            left: 12px;
            z-index: 100;
            width: 44px;
            height: 44px;
            background: var(--mt5-accent);
            border: none;
            border-radius: 50%;
            color: #fff;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 12px rgba(0,0,0,0.5);
        }
        
        /* Symbol Detail Header */
        .mt5-symbol-detail {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 8px;
            height: 100%;
            flex-shrink: 0;
            border-left: 1px solid var(--mt5-border);
        }
        
        .mt5-symbol-detail h2 {
            font-size: 13px;
            font-weight: 700;
            color: var(--mt5-text);
        }
        
        .mt5-symbol-detail .mt5-detail-price {
            font-size: 13px;
            font-family: 'Courier New', monospace;
            font-weight: 700;
        }
        
        .mt5-symbol-detail .mt5-detail-change {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 600;
        }
        
        .mt5-change-pos { 
            color: var(--mt5-buy); 
            background: rgba(8, 153, 129, 0.12); 
        }
        
        .mt5-change-neg { 
            color: var(--mt5-sell); 
            background: rgba(242, 54, 69, 0.12); 
        }
        
        /* TradingView widget containers */
        .tradingview-widget-container {
            width: 100%;
            height: 100%;
        }
        
        .tradingview-widget-container__widget {
            width: 100%;
            height: 100%;
        }
        
        /* Loading Spinner */
        .mt5-loader {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid var(--mt5-border);
            border-top-color: var(--mt5-accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }
        
        /* Notifications */
        .mt5-toast {
            position: fixed;
            top: 40px;
            right: 16px;
            background: var(--mt5-panel);
            border: 1px solid var(--mt5-border);
            border-radius: 4px;
            padding: 10px 16px;
            font-size: 12px;
            z-index: 200;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transform: translateX(120%);
            transition: transform 0.3s ease;
            max-width: 300px;
            color: var(--mt5-text);
        }
        
        .mt5-toast.show { 
            transform: translateX(0); 
        }
        
        .mt5-toast-success { 
            border-left: 3px solid var(--mt5-buy); 
        }
        
        .mt5-toast-error { 
            border-left: 3px solid var(--mt5-sell); 
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .mt5-marketwatch {
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 60;
                transform: translateX(-100%);
                box-shadow: 4px 0 20px rgba(0,0,0,0.8);
                width: 260px;
            }
            
            .mt5-marketwatch.open { 
                transform: translateX(0); 
            }
            
            .mt5-mobile-toggle { 
                display: flex; 
            }
            
            .mt5-oct-panel {
                width: 150px;
                padding: 8px;
                top: 4px;
                right: 4px;
            }
            
            .mt5-oct-price { 
                font-size: 16px; 
            }
            
            .mt5-trade-btn { 
                height: 30px; 
                font-size: 11px; 
            }
            
            .mt5-chart-header { 
                padding: 0 4px; 
            }
            
            .mt5-chart-tab { 
                padding: 0 8px; 
                font-size: 10px; 
            }
            
            .mt5-toolbar { 
                height: 32px; 
            }
            
            .mt5-tool-btn { 
                height: 24px; 
                padding: 0 6px; 
                font-size: 10px; 
            }
            
            .mt5-symbol-detail {
                display: none;
            }
        }
    </style>
</head>
<body>

<div id="ts-global-header"></div>

<<main class="mt5-container">
    <!-- Top Status Bar -->
    <div class="mt5-topbar">
        <div class="flex items-center gap-4">
            <span class="font-bold text-white text-xs tracking-wider">MetaTrader 5</span>
            <span id="connectionStatus">Connecting...</span>
        </div>
        <div class="flex items-center gap-4">
            <span id="accountBalance">Balance: --</span>
            <span id="serverTime">--:--:--</span>
        </div>
    </div>
    
    <!-- Main Toolbar -->
    <div class="mt5-toolbar">
        <button class="mt5-tool-btn" onclick="toggleMarketWatch()" title="Market Watch">
            <svg viewBox="0 0 24 24"><path d="M3 3v18h18V3H3zm16 16H5V5h14v14zM7 10h2v7H7v-7zm4-3h2v10h-2V7zm4 6h2v4h-2v-4z"/></svg>
            <span class="hidden sm:inline">Market Watch</span>
        </button>
        <button class="mt5-tool-btn active" onclick="setChartTab('advanced')" id="toolBtnAdvanced" title="Advanced Chart">
            <svg viewBox="0 0 24 24"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></svg>
            <span class="hidden sm:inline">Chart</span>
        </button>
        <button class="mt5-tool-btn" onclick="setChartTab('market')" id="toolBtnMarket" title="Market Overview">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
            <span class="hidden sm:inline">Market</span>
        </button>
        <button class="mt5-tool-btn" onclick="setChartTab('economic')" id="toolBtnEconomic" title="Economic Calendar">
            <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM9 10H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/></svg>
            <span class="hidden sm:inline">Calendar</span>
        </button>
        <button class="mt5-tool-btn" onclick="setChartTab('technical')" id="toolBtnTechnical" title="Technical Analysis">
            <svg viewBox="0 0 24 24"><path d="M22 17H18V10H22V17ZM13 17H9V7H13V17ZM4 17H0V12H4V17Z"/></svg>
            <span class="hidden sm:inline">Tech Analysis</span>
        </button>
        <button class="mt5-tool-btn" onclick="setChartTab('screener')" id="toolBtnScreener" title="Stock Screener">
            <svg viewBox="0 0 24 24"><path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/></svg>

// SYMBOL MANAGEMENT (A-Z List with Live Prices)
// ==========================================
async function loadSymbols() {
    const listContainer = document.getElementById('symbolList');
    if (!listContainer) return;
    listContainer.innerHTML = '<div style="padding:20px;text-align:center;color:#868993;font-size:11px;"><div class="mt5-loader" style="margin:0 auto 8px;"></div>Loading live market data...</div>';
    
    symbolsData = [...ALL_SYMBOLS];
    symbolsData.sort((a, b) => a.symbol.localeCompare(b.symbol));
    
    try {
        // Fetch top 100 coins from CoinGecko for real crypto prices
        const cgResponse = await fetch(`${COINGECKO_API}/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1&sparkline=false&price_change_percentage=24h`);
        const cgData = await cgResponse.json();
        
        // Fetch forex rates
        let fxRates = {};
        try {
            const fxResponse = await fetch(EXCHANGE_API);
            const fxData = await fxResponse.json();
            if (fxData && fxData.conversion_rates) fxRates = fxData.conversion_rates;
        } catch(e) { console.warn('Forex API error:', e); }
        
        // Fetch stock quotes from Finnhub (free tier, 60 calls/min)
        const stockSymbols = ['AAPL','MSFT','GOOGL','AMZN','TSLA','META','NVDA','NFLX','AMD','INTC','PYPL','DIS','BA','JPM','V','WMT','KO','PFE','XOM','JNJ'];
        const stockPromises = stockSymbols.map(async sym => {
            try {
                const res = await fetch(`${FINNHUB_API}/quote?symbol=${sym}&token=${FINNHUB_KEY}`);
                if (!res.ok) return null;
                const data = await res.json();
                return { symbol: sym, data };
            } catch(e) { return null; }
        });
        const stockResults = await Promise.all(stockPromises);
        
        // Map prices
        const priceMap = {};
        
        // Crypto from CoinGecko
        cgData.forEach(coin => {
            const sym = coin.symbol.toUpperCase();
            const match = symbolsData.find(s => s.symbol.startsWith(sym) && s.type === 'crypto');
            if (match) {
                priceMap[match.symbol] = {
                    price: coin.current_price,
                    change: coin.price_change_percentage_24h || 0
                };
            }
        });
        
        // Forex from ExchangeRate
        if (fxRates.USD) {
            const forexPairs = {
                'EURUSD': fxRates.EUR,
                'GBPUSD': fxRates.GBP,
                'USDJPY': fxRates.JPY,
                'AUDUSD': fxRates.AUD,
                'USDCAD': 1/fxRates.CAD,
                'USDCHF': fxRates.CHF,
                'NZDUSD': fxRates.NZD,
                'EURGBP': fxRates.EUR / fxRates.GBP,
                'EURJPY': fxRates.EUR * fxRates.JPY,
                'GBPJPY': fxRates.GBP * fxRates.JPY,
                'AUDJPY': fxRates.AUD * fxRates.JPY,
                'CHFJPY': fxRates.JPY / fxRates.CHF,
                'EURAUD': fxRates.EUR / fxRates.AUD,
                'EURCHF': fxRates.EUR / fxRates.CHF,
                'GBPAUD': fxRates.GBP / fxRates.AUD,
                'GBPCAD': fxRates.GBP / fxRates.CAD,
                'CADJPY': fxRates.JPY / fxRates.CAD,
                'NZDJPY': fxRates.NZD * fxRates.JPY,
                'AUDCAD': fxRates.AUD / fxRates.CAD,
                'AUDCHF': fxRates.AUD / fxRates.CHF
            };
            Object.entries(forexPairs).forEach(([sym, price]) => {
                if (price && isFinite(price)) {
                    priceMap[sym] = { price: price, change: (Math.random() - 0.5) * 1.5 };
                }
            });
        }
        
        // Stocks from Finnhub
        stockResults.forEach(result => {
            if (result && result.data && result.data.c) {
                const price = result.data.c;
                const prev = result.data.pc;
                const change = prev ? ((price - prev) / prev) * 100 : 0;
                priceMap[result.symbol] = { price, change };
            }
        });
        
        // Commodities / Indices fallback to approximate real baselines with micro-movement
        const commodityBase = {
            'XAUUSD': 2340, 'XAGUSD': 27.5, 'USOIL': 78, 'BRENT': 82,
            'SPX': 5200, 'NDX': 18300, 'DJI': 39000, 'DXY': 104.5,
            'VIX': 13, 'FTSE': 8200
        };
        Object.entries(commodityBase).forEach(([sym, base]) => {
            const move = (Math.random() - 0.5) * (base * 0.002);
            priceMap[sym] = { 
                price: base + move, 
                change: (Math.random() - 0.5) * (sym.startsWith('X') ? 1.5 : 0.8) 
            };
        });
        
        // Merge into symbolsData
        symbolsData.forEach(s => {
            if (priceMap[s.symbol]) {
                s.price = priceMap[s.symbol].price;
                s.change = priceMap[s.symbol].change;
            }
        });
        
        renderSymbols(symbolsData);
        updateCurrentSymbolPrice();
        
        const connStatus = document.getElementById('connectionStatus');
        if (connStatus) connStatus.textContent = 'Connected';
        
    } catch (error) {
        console.error('Error loading market data:', error);
        renderSymbols(symbolsData);
        showToast('Using offline mode - real-time data unavailable', 'error');
        const connStatus = document.getElementById('connectionStatus');
        if (connStatus) connStatus.textContent = 'Limited';
    }
}

function renderSymbols(symbols) {
    const listContainer = document.getElementById('symbolList');
    if (!listContainer) return;
    
    if (symbols.length === 0) {
        listContainer.innerHTML = '<div style="padding:20px;text-align:center;color:#868993;font-size:11px;">No symbols found</div>';
        return;
    }
    
    let currentLetter = '';
    let html = '';
    
    symbols.forEach(s => {
        const firstLetter = s.symbol.charAt(0).toUpperCase();
        if (firstLetter !== currentLetter) {
            currentLetter = firstLetter;
            html += `<div class="mt5-alpha-section">${currentLetter}</div>`;
        }
        
        const isActive = s.tv === currentSymbol;
        const priceClass = (s.change >= 0) ? 'mt5-price-up' : 'mt5-price-down';
        const changeSign = (s.change >= 0) ? '+' : '';
        const price = s.price ? formatPrice(s.price, s.type) : '--';
        const changeStr = s.change ? (changeSign + s.change.toFixed(2) + '%') : '0.00%';
        
        html += `
            <div class="mt5-symbol-item ${isActive ? 'active' : ''}" onclick="selectSymbol('${s.tv}', '${s.symbol}')" data-symbol="${s.symbol}">
                <div>
                    <div class="mt5-symbol-name">${s.symbol}</div>
                    <div class="mt5-symbol-type">${s.type}</div>
                </div>
                <div style="text-align:right">
                    <div class="mt5-symbol-price ${priceClass}">${price}</div>
                    <div class="mt5-symbol-spread">${changeStr}</div>
                </div>
            </div>
        `;
    });
    
    listContainer.innerHTML = html;
}

function filterSymbols(query) {
    const filtered = symbolsData.filter(s => 
        s.symbol.toLowerCase().includes(query.toLowerCase()) ||
        s.name.toLowerCase().includes(query.toLowerCase()) ||
        s.type.toLowerCase().includes(query.toLowerCase())
    );
    renderSymbols(filtered);
}

function selectSymbol(tvSymbol, plainSymbol) {
    currentSymbol = tvSymbol;
    currentSymbolPlain = plainSymbol;
    
    // Update active state in list
    document.querySelectorAll('.mt5-symbol-item').forEach(el => {
        el.classList.toggle('active', el.dataset.symbol === plainSymbol);
    });
    
    // Update displays
    const currSymDisplay = document.getElementById('currentSymbolDisplay');
    const statusSymbol = document.getElementById('statusSymbol');
    if (currSymDisplay) currSymDisplay.textContent = plainSymbol;
    if (statusSymbol) statusSymbol.textContent = plainSymbol;
    
    // Update chart if on advanced tab
    if (activeTab === 'advanced') {
        if (chartWidget) {
            try { chartWidget.remove(); } catch(e) {}
        }
        setTimeout(initChart, 50);
    }
    
    // Update embedded widget symbols where applicable
    updateEmbeddedWidgets(tvSymbol);
    
    // Close mobile panel
    if (window.innerWidth <= 768) {
        const mwPanel = document.getElementById('marketWatchPanel');
        if (mwPanel) mwPanel.classList.remove('open');
    }
    
    updateCurrentSymbolPrice();
    showToast(`Chart loaded: ${plainSymbol}`, 'success');
}

function startPriceUpdates() {
    // Immediate first update
    setTimeout(updateLivePrices, 2000);
    
    // Periodic updates every 15 seconds
    priceUpdateInterval = setInterval(updateLivePrices, 15000);
}

async function updateLivePrices() {
    try {
        // Update top 20 crypto from CoinGecko
        const ids = 'bitcoin,ethereum,solana,cardano,ripple,polkadot,avalanche-2,chainlink,matic-network,litecoin,uniswap,cosmos,ethereum-classic,stellar,algorand,vechain,filecoin,tron,near,aptos';
        const cgResponse = await fetch(`${COINGECKO_API}/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`);
        const cgData = await cgResponse.json();
        
        const cryptoMap = {
            'bitcoin': 'BTCUSD', 'ethereum': 'ETHUSD', 'solana': 'SOLUSDT',
            'cardano': 'ADAUSDT', 'ripple': 'XRPUSDT', 'polkadot': 'DOTUSDT',
            'avalanche-2': 'AVAXUSDT', 'chainlink': 'LINKUSDT', 'matic-network': 'MATICUSDT',
            'litecoin': 'LTCUSDT', 'uniswap': 'UNIUSDT', 'cosmos': 'ATOMUSDT',
            'ethereum-classic': 'ETCUSDT', 'stellar': 'XLMUSDT', 'algorand': 'ALGOUSDT',
            'vechain': 'VETUSDT', 'filecoin': 'FILUSDT', 'tron': 'TRXUSDT',
            'near': 'NEARUSDT', 'aptos': 'APTUSDT'
        };
        
        Object.entries(cryptoMap).forEach(([id, sym]) => {
            if (cgData[id]) {
                const s = symbolsData.find(x => x.symbol === sym);
                if (s) {
                    s.price = cgData[id].usd;
                    s.change = cgData[id].usd_24h_change || 0;
                }
            }
        });
        
        // Micro-movement simulation for forex/stocks to keep UI alive between API calls
        symbolsData.forEach(s => {
            if (s.price && !cryptoMap[Object.keys(cryptoMap).find(k => cryptoMap[k] === s.symbol)]) {
                const jitter = s.price * 0.0002 * (Math.random() - 0.5);
                s.price += jitter;
            }
        });
        
        renderSymbols(symbolsData);
        updateCurrentSymbolPrice();
        updateBidAsk();
        
    } catch (e) {
        // Silent fail - prices remain at last known
    }
}

function updateCurrentSymbolPrice() {
    const s = symbolsData.find(x => x.tv === currentSymbol);
    if (!s || !s.price) return;
    
    const priceEl = document.getElementById('currentPriceDisplay');
    const changeEl = document.getElementById('currentChangeDisplay');
    const octPrice = document.getElementById('octPrice');
    const octSpread = document.getElementById('octSpread');
    
    const priceStr = formatPrice(s.price, s.type);
    const changeStr = (s.change >= 0 ? '+' : '') + (s.change || 0).toFixed(2) + '%';
    
    if (priceEl) {
        priceEl.textContent = priceStr;
        priceEl.className = `mt5-detail-price ${s.change >= 0 ? 'mt5-price-up' : 'mt5-price-down'}`;
    }
    
    if (changeEl) {
        changeEl.textContent = changeStr;
        changeEl.className = `mt5-detail-change ${s.change >= 0 ? 'mt5-change-pos' : 'mt5-change-neg'}`;
    }
    
    if (octPrice) {
        octPrice.textContent = priceStr;
        octPrice.className = `mt5-oct-price ${s.change >= 0 ? 'mt5-price-up' : 'mt5-price-down'}`;
    }
    
    if (octSpread) {
        let spread;
        if (s.type === 'forex') spread = (Math.random() * 1.5 + 0.3).toFixed(1) + ' pips';
        else if (s.type === 'crypto') spread = (Math.random() * 45 + 15).toFixed(1) + ' pts';
        else if (s.type === 'stock') spread = '$' + (Math.random() * 0.08 + 0.01).toFixed(2);
        else spread = (Math.random() * 0.5).toFixed(2) + ' pts';
        octSpread.textContent = spread;
    }
}

function updateBidAsk() {
    const s = symbolsData.find(x => x.tv === currentSymbol);
    if (!s || !s.price) return;
    const spread = s.type === 'forex' ? 0.0002 : s.type === 'crypto' ? 0.5 : 0.05;
    const bid = s.price - spread/2;
    const ask = s.price + spread/2;
    const statusBidAsk = document.getElementById('statusBidAsk');
    if (statusBidAsk) {
        statusBidAsk.textContent = formatPrice(bid, s.type) + ' / ' + formatPrice(ask, s.type);
    }
}

function formatPrice(price, type) {
    if (price === undefined || price === null) return '--';
    if (type === 'forex') return price.toFixed(5);
    if (type === 'crypto') return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    if (type === 'index') return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    if (type === 'commodity') return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return price.toFixed(2);
}

        setTimeout(initChart, 50);
    }
    
    showToast(`Timeframe: ${statusTF ? statusTF.textContent : tf}`, 'success');
}

// ==========================================
// TAB SWITCHING
// ==========================================
function setChartTab(tab) {
    activeTab = tab;
    
    // Update toolbar buttons
    document.querySelectorAll('.mt5-tool-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    const toolBtnMap = {
        'advanced': 'toolBtnAdvanced',
        'market': 'toolBtnMarket',
        'economic': 'toolBtnEconomic',
        'technical': 'toolBtnTechnical',
        'screener': 'toolBtnScreener',
        'tools': 'toolBtnTools',
        'ticker': 'toolBtnTicker'
    };
    const toolBtn = document.getElementById(toolBtnMap[tab]);
    if (toolBtn) toolBtn.classList.add('active');
    
    // Update chart tabs
    document.querySelectorAll('.mt5-chart-tab').forEach(btn => {
        btn.classList.remove('active');
    });
    const tabMap = {
        'advanced': 'tabAdvanced',
        'market': 'tabMarketWatch',
        'economic': 'tabEconomic',
        'technical': 'tabTechnical',
        'screener': 'tabScreener',
        'tools': 'tabTools',
        'ticker': 'tabTicker'
    };
    const tabBtn = document.getElementById(tabMap[tab]);
    if (tabBtn) tabBtn.classList.add('active');
    
    // Show/hide panels
    document.querySelectorAll('.mt5-widget-panel').forEach(panel => {
        panel.classList.remove('active');
    });
    
    const panelMap = {
        'advanced': 'panelAdvanced',
        'market': 'panelMarket',
        'economic': 'panelEconomic',
        'technical': 'panelTechnical',
        'screener': 'panelScreener',
        'tools': 'panelTools',
        'ticker': 'panelTicker'
    };
    
    const targetPanel = document.getElementById(panelMap[tab]);
    if (targetPanel) targetPanel.classList.add('active');
    
    // Re-init chart if switching to advanced
    if (tab === 'advanced') {
        setTimeout(() => {
            if (chartWidget) {
                try { chartWidget.remove(); } catch(e) {}
            }
            initChart();
        }, 100);
    }
    
    // Update embedded widgets for other tabs when switching to them
    if (['technical','tools','ticker'].includes(tab)) {
        updateEmbeddedWidgets(currentSymbol);
    }
}

// ==========================================
// PANEL TOGGLES
// ==========================================
function toggleOCTPanel() {
    const panel = document.getElementById('octPanel');
    if (!panel) return;
    octPanelVisible = !octPanelVisible;
    panel.classList.toggle('visible', octPanelVisible);
}

function toggleIndicatorsPanel() {
    const panel = document.getElementById('indicatorsPanel');
    if (panel) panel.classList.toggle('visible');
}

function toggleMarketWatch() {
    const panel = document.getElementById('marketWatchPanel');
    if (panel) panel.classList.toggle('open');
}

// ==========================================
// VOLUME CONTROLS
// ==========================================
function adjustVolume(delta) {
    let newVol = currentVolume + delta;
    newVol = Math.max(0.01, Math.min(1000, newVol));
    newVol = Math.round(newVol * 100) / 100;
    currentVolume = newVol;
    const volDisplay = document.getElementById('volumeDisplay');
    if (volDisplay) volDisplay.textContent = newVol.toFixed(2);
}

// ==========================================
// TRADING FUNCTIONS
// ==========================================
function placeChartOrder(direction) {
    const s = symbolsData.find(x => x.tv === currentSymbol);
    const price = s ? s.price : 0;
    const type = direction.toUpperCase();
    
    showToast(`${type} Order: ${currentSymbolPlain} @ ${price ? formatPrice(price, s.type) : '--'} | Vol: ${currentVolume.toFixed(2)}`, 'success');
    
    const btn = event && event.target ? event.target.closest('.mt5-trade-btn') : null;
    if (btn) {
        btn.style.transform = 'scale(0.95)';
        setTimeout(() => btn.style.transform = 'scale(1)', 150);
    }
}

function addIndicator(indicator) {
    showToast(`Indicator: ${indicator} added`, 'success');
    toggleIndicatorsPanel();
}

// ==========================================
// UTILITY FUNCTIONS
// ==========================================
function resetChart() {
    if (chartWidget) {
        try { chartWidget.remove(); } catch(e) {}
    }
    initChart();
    showToast('Chart reset', 'success');
}

function updateServerTime() {
    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-US', { hour12: false });
    const servTime = document.getElementById('serverTime');
    if (servTime) servTime.textContent = timeStr;
    
    // Update ping randomly
    const ping = Math.floor(Math.random() * 40) + 10;
    const statusPing = document.getElementById('statusPing');
    if (statusPing) statusPing.textContent = ping + 'ms';
}

function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    if (!toast) return;
    toast.textContent = message;
    toast.className = `mt5-toast mt5-toast-${type} show`;
    
    setTimeout(() => {
        toast.classList.remove('show');
    }, 3000);
}

// ==========================================
// KEYBOARD SHORTCUTS
// ==========================================
document.addEventListener('keydown', function(e) {
    if (e.key === 'F8') {
        e.preventDefault();
        toggleIndicatorsPanel();
    }
    
    const tfMap = {
        '1': '1', '2': '5', '3': '15', '4': '30', '5': '60',
        '6': '240', '7': 'D', '8': 'W', '9': 'M'
    };
    if (tfMap[e.key] && !e.ctrlKey && !e.altKey && !e.metaKey) {
        setTimeframe(tfMap[e.key]);
    }
    
    if (e.key === 'b' || e.key === 'B') {
        if (!e.ctrlKey && !e.altKey && !e.metaKey) {
            // Quick buy shortcut
        }
    }
});

// ==========================================
// WINDOW RESIZE HANDLER
// ==========================================
let resizeTimeout;
window.addEventListener('resize', function() {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => {
        if (activeTab === 'advanced') {
            if (chartWidget) {
                try { chartWidget.remove(); } catch(e) {}
            }
            initChart();
        }
    }, 300);
});
</script>
