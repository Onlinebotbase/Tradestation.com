<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Holdings - Trade Station</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{brand:{600:'#2563eb'},dark:{800:'#1f2937',900:'#111827',950:'#0b0f19'}}}}}</script>
  <style>body{background:#0b0f19;}</style>
</head>
<body class="text-white">
  <div id="ts-global-header"></div>
  <main class="pb-24 pt-2 px-4 max-w-lg mx-auto">
    <div class="flex items-center justify-between mb-4">
      <h1 class="text-lg font-bold">Holdings</h1>
      <button onclick="location.href='holding-investment.html'" class="px-3 py-1.5 bg-brand-600 text-white text-xs font-bold rounded-lg">+ New Holding</button>
    </div>
    <div id="holdings-container" class="space-y-3"></div>
    <div id="no-holdings" class="hidden text-center py-12">
      <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-gray-800 flex items-center justify-center">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-gray-500"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
      </div>
      <p class="text-gray-500 text-sm mb-2">No active holdings</p>
      <button onclick="location.href='holding-investment.html'" class="text-brand-400 text-sm font-semibold">Start your first holding</button>
    </div>
  </main>
  <div id="ts-global-footer"></div>
  <script src="app.js"></script>
  <script>
    if (!TS_Auth.requireAuth()) throw new Error('Auth required');

    function renderHoldings() {
      const holdings = TS_Invest.getHoldings();
      const active = holdings.filter(h => h.status === 'active');
      const container = document.getElementById('holdings-container');
      const noHoldings = document.getElementById('no-holdings');

      if (active.length === 0) { container.innerHTML = ''; noHoldings.classList.remove('hidden'); return; }
      noHoldings.classList.add('hidden');

      container.innerHTML = active.map(h => {
        const liveVal = TS_Invest.calculateLiveValue(h);
        const profit = liveVal - h.amount;
        const profitPct = (profit / h.amount) * 100;
        const now = Date.now();
        const end = new Date(h.endDate).getTime();
        const remaining = Math.max(0, end - now);
        const days = Math.floor(remaining / 86400000);
        const hours = Math.floor((remaining % 86400000) / 3600000);

        return `
          <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-4">
            <div class="flex items-center justify-between mb-3">
              <div class="flex items-center gap-2">
                <span class="text-sm font-bold text-white">${h.symbol.toUpperCase()}</span>
                <span class="text-xs px-2 py-0.5 rounded bg-brand-600/20 text-brand-400">${h.planName || 'Plan'}</span>
              </div>
              <span class="text-xs text-gray-400">${days}d ${hours}h left</span>
            </div>
            <div class="grid grid-cols-3 gap-4 mb-3">
              <div><div class="text-xs text-gray-400">Invested</div><div class="text-sm font-bold text-white">$${h.amount.toFixed(2)}</div></div>
              <div><div class="text-xs text-gray-400">Current</div><div class="text-sm font-bold text-green-400">$${liveVal.toFixed(2)}</div></div>
              <div><div class="text-xs text-gray-400">Return</div><div class="text-sm font-bold text-green-400">+${profitPct.toFixed(2)}%</div></div>
            </div>
            <div class="flex gap-2">
              <button onclick="topUpHolding('${h.id}')" class="flex-1 py-2 bg-gray-700 hover:bg-gray-600 text-white text-xs font-bold rounded-lg">Top Up</button>
              <button onclick="location.href='charts.html'" class="px-3 py-2 bg-gray-700 hover:bg-gray-600 text-white text-xs font-bold rounded-lg">Chart</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function topUpHolding(id) {
      TS_UI.showModal('Top Up Holding', `
        <div class="space-y-3">
          <label class="text-xs text-gray-400">Additional Amount ($)</label>
          <input type="number" id="topup-amount" class="w-full px-3 py-2 bg-gray-900 border border-gray-700 rounded-lg text-white" min="10">
        </div>
      `, [
        { text: 'Cancel', onClick: () => {} },
        { text: 'Top Up', primary: true, onClick: () => {
          const amt = parseFloat(document.getElementById('topup-amount').value);
          if (!amt || amt < 10) { TS_UI.showToast('Minimum $10', 'warning'); return; }
          if (amt > TS_Balance.get()) { TS_UI.showToast('Insufficient balance', 'error'); return; }
          let holdings = TS_Invest.getHoldings();
          const idx = holdings.findIndex(h => h.id === id);
          if (idx >= 0) {
            holdings[idx].amount += amt;
            holdings[idx].currentValue += amt;
            TS_Invest.saveHoldings(holdings);
            TS_Balance.subtract(amt);
            TS_UI.showToast('Holding topped up successfully', 'success');
            renderHoldings();
          }
        }}
      ]);
    }

    renderHoldings();
    setInterval(renderHoldings, 1000);
  </script>
</body>
</html>
