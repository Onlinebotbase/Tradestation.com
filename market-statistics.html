<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Market Statistics - Trade Station</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{brand:{600:'#2563eb'},dark:{800:'#1f2937',900:'#111827',950:'#0b0f19'}}}}}</script>
  <style>body{background:#0b0f19;}</style>
</head>
<body class="text-white">
  <div id="ts-global-header"></div>
  <main class="pb-24 pt-2 px-4 max-w-lg mx-auto">
    <h1 class="text-lg font-bold mb-4">Market Statistics</h1>
    <div id="stats-container" class="bg-dark-800 border border-gray-700/50 rounded-xl p-4">
      <div class="text-center text-gray-400 text-sm py-8">Select a symbol to view detailed statistics.</div>
    </div>
  </main>
  <div id="ts-global-footer"></div>
  <script src="app.js"></script>
  <script>
    if (!TS_Auth.requireAuth()) throw new Error('Auth required');
    const sym = TS_DB.get('stats_symbol', 'BTC');

    async function loadStats() {
      const coins = await TS_Market.getCoins();
      const coin = coins.find(c => c.symbol.toLowerCase() === sym.toLowerCase());
      if (!coin) { document.getElementById('stats-container').innerHTML = '<div class="text-center text-gray-400 text-sm py-8">Symbol data not available.</div>'; return; }

      document.getElementById('stats-container').innerHTML = `
        <div class="flex items-center gap-3 mb-4">
          <img src="${coin.image}" class="w-12 h-12 rounded-full">
          <div>
            <div class="text-xl font-bold text-white">${coin.name}</div>
            <div class="text-sm text-gray-400">${coin.symbol.toUpperCase()}</div>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div class="bg-gray-900 rounded-lg p-3"><div class="text-xs text-gray-400">Current Price</div><div class="text-lg font-bold text-white">$${coin.current_price.toLocaleString()}</div></div>
          <div class="bg-gray-900 rounded-lg p-3"><div class="text-xs text-gray-400">24h Change</div><div class="text-lg font-bold ${coin.price_change_percentage_24h >= 0 ? 'text-green-400' : 'text-red-400'}">${coin.price_change_percentage_24h?.toFixed(2) || 0}%</div></div>
          <div class="bg-gray-900 rounded-lg p-3"><div class="text-xs text-gray-400">Market Cap</div><div class="text-lg font-bold text-white">$${(coin.market_cap / 1e9).toFixed(2)}B</div></div>
          <div class="bg-gray-900 rounded-lg p-3"><div class="text-xs text-gray-400">24h Volume</div><div class="text-lg font-bold text-white">$${(coin.total_volume / 1e6).toFixed(2)}M</div></div>
          <div class="bg-gray-900 rounded-lg p-3"><div class="text-xs text-gray-400">High 24h</div><div class="text-lg font-bold text-white">$${coin.high_24h?.toLocaleString() || '--'}</div></div>
          <div class="bg-gray-900 rounded-lg p-3"><div class="text-xs text-gray-400">Low 24h</div><div class="text-lg font-bold text-white">$${coin.low_24h?.toLocaleString() || '--'}</div></div>
        </div>
        <div class="mt-4 flex gap-2">
          <button onclick="TS_DB.set('selected_symbol',{symbol:'${coin.symbol}',name:'${coin.name.replace(/'/g,"\\'")}'});location.href='order-ticket.html'" class="flex-1 py-2 bg-brand-600 text-white font-bold rounded-lg text-sm">New Order</button>
          <button onclick="TS_DB.set('chart_symbol','${coin.symbol}');location.href='charts.html'" class="flex-1 py-2 bg-gray-700 text-white font-bold rounded-lg text-sm">Chart</button>
        </div>
      `;
    }
    loadStats();
  </script>
</body>
</html>
