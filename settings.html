<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Settings - Trade Station</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{brand:{600:'#2563eb'},dark:{800:'#1f2937',900:'#111827',950:'#0b0f19'}}}}}</script>
  <style>body{background:#0b0f19;}</style>
</head>
<body class="text-white">
  <div id="ts-global-header"></div>
  <main class="pb-24 pt-2 px-4 max-w-lg mx-auto">
    <h1 class="text-lg font-bold mb-4">Settings</h1>
    <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-4 mb-4 space-y-4">
      <h2 class="text-sm font-bold text-gray-300">Notifications</h2>
      <div class="flex items-center justify-between">
        <span class="text-sm text-gray-300">Push Notifications</span>
        <button id="notif-toggle" onclick="toggleSetting('notifications')" class="w-12 h-6 rounded-full bg-brand-600 relative transition-colors">
          <span class="absolute top-0.5 right-0.5 w-5 h-5 bg-white rounded-full transition-transform"></span>
        </button>
      </div>
      <div class="flex items-center justify-between">
        <span class="text-sm text-gray-300">Market Alerts</span>
        <button id="alerts-toggle" onclick="toggleSetting('marketAlerts')" class="w-12 h-6 rounded-full bg-gray-600 relative transition-colors">
          <span class="absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full transition-transform"></span>
        </button>
      </div>
    </div>
    <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-4 mb-4 space-y-4">
      <h2 class="text-sm font-bold text-gray-300">Appearance</h2>
      <div class="flex items-center justify-between">
        <span class="text-sm text-gray-300">Dark Mode</span>
        <button class="w-12 h-6 rounded-full bg-brand-600 relative transition-colors">
          <span class="absolute top-0.5 right-0.5 w-5 h-5 bg-white rounded-full"></span>
        </button>
      </div>
    </div>
    <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-4 mb-4 space-y-3">
      <h2 class="text-sm font-bold text-gray-300">Account</h2>
      <button onclick="TS_Auth.logout()" class="w-full py-2.5 text-left text-red-400 text-sm font-medium">Logout</button>
      <button onclick="TS_UI.showModal('Clear Data','This will clear all local data. Are you sure?',[{'text':'Cancel'},{'text':'Clear',primary:true,onClick:()=>{localStorage.clear();location.href='index.html';}}])" class="w-full py-2.5 text-left text-red-400 text-sm font-medium">Clear All Data</button>
    </div>
  </main>
  <div id="ts-global-footer"></div>
  <script src="app.js"></script>
  <script>
    if (!TS_Auth.requireAuth()) throw new Error('Auth required');
    const settings = TS_DB.get('settings', { notifications: true, marketAlerts: false });
    function updateToggles() {
      const notifBtn = document.getElementById('notif-toggle');
      const alertBtn = document.getElementById('alerts-toggle');
      if (settings.notifications) { notifBtn.classList.add('bg-brand-600'); notifBtn.classList.remove('bg-gray-600'); notifBtn.querySelector('span').style.transform = 'translateX(0)'; }
      else { notifBtn.classList.remove('bg-brand-600'); notifBtn.classList.add('bg-gray-600'); notifBtn.querySelector('span').style.transform = 'translateX(-24px)'; }
      if (settings.marketAlerts) { alertBtn.classList.add('bg-brand-600'); alertBtn.classList.remove('bg-gray-600'); alertBtn.querySelector('span').style.transform = 'translateX(24px)'; }
      else { alertBtn.classList.remove('bg-brand-600'); alertBtn.classList.add('bg-gray-600'); alertBtn.querySelector('span').style.transform = 'translateX(0)'; }
    }
    function toggleSetting(key) {
      settings[key] = !settings[key];
      TS_DB.set('settings', settings);
      updateToggles();
    }
    updateToggles();
  </script>
</body>
</html>
