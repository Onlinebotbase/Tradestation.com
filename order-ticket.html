<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Order Ticket - Trade Station</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brand: { 600: '#2563eb' }, dark: { 800: '#1f2937', 900: '#111827', 950: '#0b0f19' } } } } }</script>
  <style>body { background: #0b0f19; }</style>
</head>
<body class="text-white">
  <div id="ts-global-header"></div>
  <main class="pb-24 pt-2 px-4 max-w-lg mx-auto">
    <h1 class="text-lg font-bold mb-4">Order Ticket</h1>

    <!-- Symbol Selection -->
    <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-4 mb-4" onclick="location.href='trade-symbol.html'">
      <div class="flex items-center justify-between cursor-pointer">
        <div>
          <div class="text-xs text-gray-400">Symbol</div>
          <div class="text-lg font-bold text-white" id="selected-symbol">Select Symbol</div>
          <div class="text-sm text-green-400 font-mono" id="symbol-price">--</div>
        </div>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </div>
    </div>

    <form id="order-form" class="space-y-4">
      <!-- Order Type -->
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1">Order Type</label>
        <select id="orderType" class="w-full px-3 py-2.5 bg-dark-800 border border-gray-700 rounded-lg text-white text-sm focus:outline-none focus:border-brand-600">
          <option>Market Execution</option>
          <option>Buy Limit</option>
          <option>Sell Limit</option>
        </select>
      </div>

      <!-- Volume -->
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1">Volume (Lots)</label>
        <div class="flex items-center gap-2">
          <button type="button" onclick="adjustVolume(-0.01)" class="w-10 h-10 bg-gray-700 rounded-lg text-white font-bold">-</button>
          <input type="number" id="volume" value="0.10" step="0.01" min="0.01" class="flex-1 px-3 py-2 bg-dark-800 border border-gray-700 rounded-lg text-white text-center font-bold">
          <button type="button" onclick="adjustVolume(0.01)" class="w-10 h-10 bg-gray-700 rounded-lg text-white font-bold">+</button>
        </div>
      </div>

      <!-- Investment Amount -->
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1">Investment Amount ($)</label>
        <input type="number" id="amount" required min="10" class="w-full px-3 py-2.5 bg-dark-800 border border-gray-700 rounded-lg text-white text-sm focus:outline-none focus:border-brand-600" placeholder="Min $10">
      </div>

      <!-- Stop Loss / Take Profit -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-medium text-gray-400 mb-1">Stop Loss ($)</label>
          <input type="number" id="stopLoss" class="w-full px-3 py-2.5 bg-dark-800 border border-gray-700 rounded-lg text-white text-sm" placeholder="Optional">
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-400 mb-1">Take Profit ($)</label>
          <input type="number" id="takeProfit" class="w-full px-3 py-2.5 bg-dark-800 border border-gray-700 rounded-lg text-white text-sm" placeholder="Optional">
        </div>
      </div>

      <!-- Duration -->
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1">Trade Duration</label>
        <select id="duration" class="w-full px-3 py-2.5 bg-dark-800 border border-gray-700 rounded-lg text-white text-sm focus:outline-none focus:border-brand-600">
          <option>1 week</option>
          <option>2 weeks</option>
          <option>1 month</option>
          <option>2 months</option>
          <option>3 months</option>
          <option>6 months</option>
          <option>9 months</option>
          <option>1 year</option>
          <option>18 months</option>
          <option>2 years</option>
        </select>
      </div>

      <!-- Summary -->
      <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-4">
        <div class="flex justify-between text-sm mb-1"><span class="text-gray-400">Daily Return Rate</span><span class="text-white font-bold">10.95%</span></div>
        <div class="flex justify-between text-sm mb-1"><span class="text-gray-400">Est. Daily Profit</span><span class="text-green-400 font-bold" id="est-profit">$0.00</span></div>
        <div class="flex justify-between text-sm"><span class="text-gray-400">Available Balance</span><span class="text-white font-bold" id="avail-balance">$0.00</span></div>
      </div>

      <!-- Action Buttons -->
      <div class="grid grid-cols-2 gap-3">
        <button type="button" onclick="submitOrder('buy')" class="py-3 bg-gradient-to-r from-green-600 to-green-500 hover:from-green-500 hover:to-green-400 text-white font-bold rounded-xl shadow-lg shadow-green-600/20 transition-all">Buy</button>
        <button type="button" onclick="submitOrder('sell')" class="py-3 bg-gradient-to-r from-red-600 to-red-500 hover:from-red-500 hover:to-red-400 text-white font-bold rounded-xl shadow-lg shadow-red-600/20 transition-all">Sell</button>
      </div>
    </form>
  </main>
  <div id="ts-global-footer"></div>
  <script src="app.js"></script>
  <script>
    if (!TS_Auth.requireAuth()) throw new Error('Auth required');

    const selected = TS_DB.get('selected_symbol', null);
    let currentSymbol = selected || { symbol: 'BTC', name: 'Bitcoin' };
    document.getElementById('selected-symbol').textContent = currentSymbol.symbol.toUpperCase();

    async function updatePrice() {
      const coins = await TS_Market.getCoins();
      const coin = coins.find(c => c.symbol.toLowerCase() === currentSymbol.symbol.toLowerCase());
      if (coin) document.getElementById('symbol-price').textContent = '$' + coin.current_price.toLocaleString();
    }

    function adjustVolume(delta) {
      const el = document.getElementById('volume');
      let val = parseFloat(el.value) + delta;
      if (val < 0.01) val = 0.01;
      el.value = val.toFixed(2);
    }

    function updateSummary() {
      const amount = parseFloat(document.getElementById('amount').value) || 0;
      const daily = amount * 0.1095;
      document.getElementById('est-profit').textContent = '$' + daily.toFixed(2);
      document.getElementById('avail-balance').textContent = '$' + TS_Balance.get().toFixed(2);
    }

    document.getElementById('amount').addEventListener('input', updateSummary);
    updateSummary();

    function submitOrder(direction) {
      const amount = parseFloat(document.getElementById('amount').value);
      if (!amount || amount < 10) { TS_UI.showToast('Minimum investment is $10', 'warning'); return; }
      if (amount > TS_Balance.get()) { TS_UI.showToast('Insufficient balance', 'error'); return; }

      const trade = {
        symbol: currentSymbol.symbol,
        symbolName: currentSymbol.name || currentSymbol.symbol,
        amount: amount,
        orderType: document.getElementById('orderType').value,
        volume: parseFloat(document.getElementById('volume').value),
        stopLoss: parseFloat(document.getElementById('stopLoss').value) || 0,
        takeProfit: parseFloat(document.getElementById('takeProfit').value) || 0,
        duration: document.getElementById('duration').value,
        direction: direction,
        dailyReturnRate: 10.95
      };

      TS_Invest.addTrade(trade);
      TS_Balance.subtract(amount);

      // Record transaction
      const txs = TS_DB.get('transactions', []);
      txs.unshift({ type: 'trade', amount, symbol: currentSymbol.symbol, status: 'active', createdAt: new Date().toISOString() });
      TS_DB.set('transactions', txs);

      TS_UI.showToast(`${direction.toUpperCase()} order placed successfully!`, 'success');
      setTimeout(() => location.href = 'trade.html', 1000);
    }

    updatePrice();
    setInterval(updatePrice, 30000);
  </script>
</body>
</html>
