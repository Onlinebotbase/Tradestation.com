<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Select Holding Symbol - Trade Station</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 600: '#2563eb', 500: '#3b82f6', 400: '#60a5fa' },
            dark: { 950: '#0b0f19', 900: '#111827', 850: '#151d2e', 800: '#1f2937', 750: '#243447', 700: '#374151', 600: '#4b5563' },
            mt5: { bg: '#0b0f19', panel: '#151d2e', border: '#2a3441', hover: '#1e293b', up: '#00c853', down: '#ff1744', neutral: '#78909c', accent: '#2962ff' }
          },
          fontFamily: {
            mono: ['ui-monospace','SFMono-Regular','Menlo','Monaco','Consolas','Liberation Mono','Courier New','monospace']
          }
        }
      }
    }
  </script>
  <style>
    * { scrollbar-width: thin; scrollbar-color: #374151 #0b0f19; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0b0f19; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    body { background: #0b0f19; color: #e5e7eb; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; -webkit-font-smoothing: antialiased; }
    .mt5-panel { background: #151d2e; border: 1px solid #2a3441; border-radius: 8px; }
    .mt5-row { transition: all 0.15s ease; border-left: 3px solid transparent; }
    .mt5-row:hover { background: #1e293b; border-left-color: #2962ff; }
    .mt5-row.up { border-left-color: #00c853; }
    .mt5-row.down { border-left-color: #ff1744; }
    .price-up { color: #00c853; }
    .price-down { color: #ff1744; }
    .price-neutral { color: #78909c; }
    .sparkline { width: 80px; height: 28px; }
    .alphabet-header { background: linear-gradient(90deg, #111827 0%, #1f2937 100%); border: 1px solid #2a3441; }
    .symbol-badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 600; letter-spacing: 0.02em; }
    .badge-crypto { background: rgba(41,98,255,0.15); color: #2962ff; border: 1px solid rgba(41,98,255,0.25); }
    .badge-forex { background: rgba(0,200,83,0.15); color: #00c853; border: 1px solid rgba(0,200,83,0.25); }
    .badge-stock { background: rgba(255,171,0,0.15); color: #ffab00; border: 1px solid rgba(255,171,0,0.25); }
    .badge-commodity { background: rgba(156,39,176,0.15); color: #9c27b0; border: 1px solid rgba(156,39,176,0.25); }
    .live-pulse { animation: pulse-live 2s infinite; }
    @keyframes pulse-live { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .spread-badge { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 10px; background: #0b0f19; border: 1px solid #2a3441; padding: 1px 5px; border-radius: 3px; color: #ffab00; }
    .search-glow:focus { box-shadow: 0 0 0 2px rgba(41,98,255,0.3); border-color: #2962ff; }
    .tab-active { border-bottom: 2px solid #2962ff; color: #fff; }
    .tab-inactive { border-bottom: 2px solid transparent; color: #6b7280; }
    .tab-inactive:hover { color: #9ca3af; }
    .chart-modal { backdrop-filter: blur(12px); background: rgba(11,15,25,0.95); }
    .mini-chart { width: 100%; height: 220px; background: #0b0f19; border: 1px solid #2a3441; border-radius: 6px; }
    .stat-card { background: #111827; border: 1px solid #2a3441; border-radius: 6px; padding: 8px 12px; }
    .stat-label { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-size: 13px; font-weight: 600; font-family: ui-monospace, monospace; }
    .loading-shimmer { background: linear-gradient(90deg, #1f2937 25%, #374151 50%, #1f2937 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .news-ticker { animation: ticker 30s linear infinite; }
    @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .depth-bar { height: 4px; border-radius: 2px; background: #1f2937; overflow: hidden; }
    .depth-fill { height: 100%; border-radius: 2px; transition: width 0.3s ease; }
  </style>
</head>

  <script>
    // ============================================
    // API CONFIGURATION
    // ============================================
    const COINGECKO_API = 'https://api.coingecko.com/api/v3';
    const EXCHANGE_API = 'https://v6.exchangerate-api.com/v6/45602791eb9f29e022a7ce3f/latest/USD';
    const FINNHUB_API = 'https://finnhub.io/api/v1/news?category=general&token=d7cq1t9r01qv03eta4rgd7cq1t9r01qv03eta4s0';
    const ALPHAVANTAGE_API = 'https://www.alphavantage.co/query';
    const ALPHAVANTAGE_KEY = '3A3XN5PXKW8DG38L';

    // ============================================
    // STATE MANAGEMENT
    // ============================================
    let allSymbols = [];
    let filteredSymbols = [];
    let currentCategory = 'all';
    let currentFilter = '';
    let selectedAlphabet = null;
    let modalSymbolData = null;
    let updateInterval = null;
    let viewMode = 'list'; // 'list' or 'grid'
    let usdRates = {};

    // ============================================
    // AUTH CHECK (PRESERVED)
    // ============================================
    if (!TS_Auth || !TS_Auth.requireAuth || !TS_Auth.requireAuth()) {
      throw new Error('Auth required');
    }

    // ============================================
    // CORE FUNCTIONS (PRESERVED)
    // ============================================
    function selectSymbol(symbol, name) {
      TS_DB.set('holding_selected_symbol', { symbol, name });
      location.href = 'holding-investment.html';
    }

    // ============================================
    // DATA LOADING
    // ============================================
    async function loadSymbols() {
      showLoading(true);
      try {
        // Load exchange rates first
        await loadExchangeRates();
        
        // Load all symbol sources in parallel
        const [cryptoData, stockData, forexData, commodityData] = await Promise.all([
          loadCryptoSymbols(),
          loadStockSymbols(),
          loadForexSymbols(),
          loadCommoditySymbols()
        ]);

        allSymbols = [...cryptoData, ...stockData, ...forexData, ...commodityData];
        
        // Sort alphabetically
        allSymbols.sort((a, b) => a.symbol.localeCompare(b.symbol));
        
        // Assign sparkline data
        allSymbols.forEach(s => {
          s.sparkline = generateSparkline(s.price_change_24h || 0);
        });

        filteredSymbols = [...allSymbols];
        renderAlphabetNav();
        render();
        updateLastUpdate();
        
        // Start live updates
        startLiveUpdates();
        
        // Load news
        loadNews();
        
      } catch (err) {
        console.error('Error loading symbols:', err);
        // Fallback to basic crypto if APIs fail
        await fallbackLoad();
      } finally {
        showLoading(false);
      }
    }

    async function loadExchangeRates() {
      try {
        const res = await fetch(EXCHANGE_API);
        const data = await res.json();
        if (data.conversion_rates) {
          usdRates = data.conversion_rates;
          document.getElementById('usd-rate').textContent = `USD: ${(1/usdRates.EUR).toFixed(4)} EUR`;
        }
      } catch (e) { console.warn('Exchange rate load failed', e); }
    }

    async function loadCryptoSymbols() {
      try {
        const res = await fetch(`${COINGECKO_API}/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1&sparkline=true&price_change_percentage=24h`);
        const data = await res.json();
        return data.map(c => ({
          symbol: c.symbol.toUpperCase(),
          name: c.name,
          type: 'crypto',
          price: c.current_price,
          price_change_24h: c.price_change_percentage_24h || 0,
          high_24h: c.high_24h,
          low_24h: c.low_24h,
          volume: c.total_volume,
          market_cap: c.market_cap,
          image: c.image,
          sparkline_data: c.sparkline_in_7d?.price || [],
          bid: c.current_price ? c.current_price * 0.9995 : null,
          ask: c.current_price ? c.current_price * 1.0005 : null,
          spread: c.current_price ? (c.current_price * 0.001).toFixed(4) : '--'
        }));
      } catch (e) {
        console.warn('CoinGecko failed, using fallback crypto', e);
        return getFallbackCrypto();
      }
    }

    async function loadStockSymbols() {
      const stockSymbols = ['AAPL','MSFT','GOOGL','AMZN','TSLA','META','NVDA','JPM','V','WMT','JNJ','UNH','XOM','BAC','PG','MA','HD','CVX','LLY','ABBV','PFE','KO','PEP','MRK','CSCO','TMO','ACN','NKE','ABT','CMCSA'];
      try {
        // Use AlphaVantage batch quote (limited to 5 per call in free tier, so we'll do a few)
        const promises = stockSymbols.slice(0, 5).map(sym => 
          fetch(`${ALPHAVANTAGE_API}?function=GLOBAL_QUOTE&symbol=${sym}&apikey=${ALPHAVANTAGE_KEY}`).then(r => r.json())
        );
        const results = await Promise.all(promises);
        return results.map((r, i) => {
          const q = r['Global Quote'] || {};
          const price = parseFloat(q['05. price']) || 0;
          const change = parseFloat(q['09. change']) || 0;
          const changePercent = parseFloat((q['10. change percent'] || '0').replace('%','')) || 0;
          return {
            symbol: stockSymbols[i],
            name: getStockName(stockSymbols[i]),
            type: 'stock',
            price: price,
            price_change_24h: changePercent,
            high_24h: parseFloat(q['03. high']) || price * 1.02,
            low_24h: parseFloat(q['02. low']) || price * 0.98,
            volume: parseInt(q['06. volume']) || 0,
            image: `https://financialmodelingprep.com/image-stock/${stockSymbols[i]}.png`,
            bid: price ? price - 0.01 : null,
            ask: price ? price + 0.01 : null,
            spread: price ? '0.02' : '--'
          };
        });
      } catch (e) {
        console.warn('AlphaVantage failed, using fallback stocks', e);
        return getFallbackStocks();
      }
    }

    async function loadForexSymbols() {
      const pairs = [

    // ============================================
    // SPARKLINE GENERATION
    // ============================================
    function generateSparkline(trend) {
      const points = [];
      let val = 50;
      const trendFactor = trend * 0.1;
      for (let i = 0; i < 20; i++) {
        val += (Math.random() - 0.5) * 15 + trendFactor;
        val = Math.max(10, Math.min(90, val));
        points.push(val);
      }
      return points;
    }

    function generateSparklineSVG(data) {
      if (!data || data.length === 0) return '';
      const min = Math.min(...data);
      const max = Math.max(...data);
      const range = max - min || 1;
      const w = 80, h = 28;
      const points = data.map((v, i) => {
        const x = (i / (data.length - 1)) * w;
        const y = h - ((v - min) / range) * h;
        return `${x},${y}`;
      }).join(' ');
      const last = data[data.length - 1];
      const first = data[0];
      const color = last > first ? '#00c853' : last < first ? '#ff1744' : '#78909c';
      return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" class="opacity-80">
        <polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="${w}" cy="${h - ((last - min) / range) * h}" r="2" fill="${color}"/>
      </svg>`;
    }

    function drawModalChart(s) {
      const canvas = document.getElementById('modal-chart');
      const container = document.getElementById('modal-chart-container');
      canvas.width = container.clientWidth * 2;
      canvas.height = container.clientHeight * 2;
      const ctx = canvas.getContext('2d');
      ctx.scale(2, 2);
      
      const w = container.clientWidth;
      const h = container.clientHeight;
      
      // Background grid
      ctx.strokeStyle = '#1f2937';
      ctx.lineWidth = 0.5;
      for (let i = 0; i < 5; i++) {
        const y = (h / 4) * i;
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
      }
      for (let i = 0; i < 6; i++) {
        const x = (w / 5) * i;
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
      }
      
      // Generate chart data
      const data = s.sparkline_data && s.sparkline_data.length > 10 ? s.sparkline_data : generateChartData(s.price, 50);
      const min = Math.min(...data);
      const max = Math.max(...data);
      const range = max - min || 1;
      
      const points = data.map((v, i) => ({
        x: (i / (data.length - 1)) * w,
        y: h - 20 - ((v - min) / range) * (h - 40)
      }));
      
      const isUp = data[data.length - 1] >= data[0];
      const color = isUp ? '#00c853' : '#ff1744';
      
      // Gradient fill
      const grad = ctx.createLinearGradient(0, 0, 0, h);
      grad.addColorStop(0, isUp ? 'rgba(0,200,83,0.15)' : 'rgba(255,23,68,0.15)');
      grad.addColorStop(1, 'rgba(11,15,25,0)');
      
      ctx.beginPath();
      ctx.moveTo(points[0].x, h);
      points.forEach(p => ctx.lineTo(p.x, p.y));
      ctx.lineTo(points[points.length - 1].x, h);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();
      
      // Line
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      points.forEach(p => ctx.lineTo(p.x, p.y));
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.stroke();
      
      // Price labels
      ctx.fillStyle = '#6b7280';
      ctx.font = '10px ui-monospace, monospace';
      ctx.fillText(max.toFixed(2), 4, 12);
      ctx.fillText(min.toFixed(2), 4, h - 4);
      
      // Current price dot
      const last = points[points.length - 1];
      ctx.beginPath();
      ctx.arc(last.x, last.y, 4, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(last.x, last.y, 8, 0, Math.PI * 2);
      ctx.strokeStyle = color;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    function generateChartData(basePrice, count) {
      const data = [basePrice];
      for (let i = 1; i < count; i++) {
        data.push(data[i-1] * (1 + (Math.random() - 0.5) * 0.02));
      }
      return data;
    }

      } catch (e) { console.warn('News load failed', e); }
    }

    function loadSymbolNews(symbol) {
      const container = document.getElementById('news-container');
      if (window.newsData && window.newsData.length > 0) {
        const relevant = window.newsData.filter(n => 
          n.headline.toLowerCase().includes(symbol.toLowerCase()) ||
          (n.category && n.category.toLowerCase().includes(symbol.toLowerCase()))
        ).slice(0, 5);
        
        if (relevant.length > 0) {
          container.innerHTML = relevant.map(n => `
            <div class="flex items-start gap-2 py-1 border-b border-dark-800 last:border-0">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#ffab00" stroke-width="2" class="mt-0.5 flex-shrink-0">
                <circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6"/>
              </svg>
              <span class="truncate">${n.headline}</span>
            </div>
          `).join('');
        } else {
          container.innerHTML = `<div class="text-gray-600 italic">No recent news for ${symbol}</div>`;
        }
      } else {
        container.innerHTML = `<div class="text-gray-600 italic">News feed unavailable</div>`;
      }
    }

    // ============================================
    // LIVE UPDATES
    // ============================================
    function startLiveUpdates() {
      if (updateInterval) clearInterval(updateInterval);
      updateInterval = setInterval(async () => {
        // Simulate micro price movements
        allSymbols.forEach(s => {
          const move = (Math.random() - 0.5) * (s.price * 0.0005);
          s.price += move;
          if (s.bid) s.bid += move;
          if (s.ask) s.ask += move;
        });
        
        // Update volatility indicator
        const vol = (Math.random() * 20 + 5).toFixed(1);
        document.getElementById('market-volatility').textContent = `Vol: ${vol}%`;
        
        // Re-render if not searching/filtering heavily
        if (currentFilter === '' && selectedAlphabet === null && currentCategory === 'all') {
          filteredSymbols = [...allSymbols];
          if (viewMode === 'list') renderList(document.getElementById('symbol-list'));
        }
        
        updateLastUpdate();
      }, 3000);
    }

    function updateLastUpdate() {
      const now = new Date();
      document.getElementById('last-update').textContent = now.toLocaleTimeString('en-US', { hour12: false });
    }

    // ============================================
    // FILTERING & NAVIGATION
    // ============================================
    function filterCategory(cat) {
      currentCategory = cat;
      document.querySelectorAll('.tab-btn').forEach(btn => {
        if (btn.dataset.cat === cat) {
          btn.classList.remove('tab-inactive');
          btn.classList.add('tab-active');
        } else {
          btn.classList.remove('tab-active');
          btn.classList.add('tab-inactive');
        }
      });
      applyFilters();
    }

    function filterAlphabet(letter) {
      selectedAlphabet = selectedAlphabet === letter ? null : letter;
      renderAlphabetNav();
      applyFilters();
    }

    function applyFilters() {
      let result = allSymbols;
      
      if (currentCategory !== 'all') {
        result = result.filter(s => s.type === currentCategory);
      }
      
      if (selectedAlphabet) {
        result = result.filter(s => s.symbol[0].toUpperCase() === selectedAlphabet);
      }
      
      if (currentFilter) {
        const f = currentFilter.toLowerCase();
        result = result.filter(s => s.symbol.toLowerCase().includes(f) || s.name.toLowerCase().includes(f));
      }
      
      filteredSymbols = result;
      render();
    }

    function toggleViewMode() {
      viewMode = viewMode === 'list' ? 'grid' : 'list';
      render();
    }

    function refreshAllData() {
      loadSymbols();
    }

    function showLoading(show) {
      const el = document.getElementById('loading-state');
      if (show) el.classList.remove('hidden');
      else el.classList.add('hidden');
    }

    // ============================================
    // FORMATTING UTILITIES
    // ============================================
    function formatPrice(price) {
      if (!price && price !== 0) return '--';
      if (price >= 1000) return '$' + price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      if (price >= 1) return '$' + price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 4 });
      if (price >= 0.01) return '$' + price.toLocaleString('en-US', { minimumFractionDigits: 4, maximumFractionDigits: 6 });
      return '$' + price.toLocaleString('en-US', { minimumFractionDigits: 6, maximumFractionDigits: 8 });
    }

    function formatVolume(vol) {
      if (!vol) return '--';
      if (vol >= 1e9) return (vol / 1e9).toFixed(2) + 'B';
      if (vol >= 1e6) return (vol / 1e6).toFixed(2) + 'M';
      if (vol >= 1e3) return (vol / 1e3).toFixed(2) + 'K';
      return vol.toString();
    }

    // ============================================
    // SEARCH EVENT LISTENER
    // ============================================
    document.getElementById('search').addEventListener('input', e => {
      currentFilter = e.target.value;
      applyFilters();
    });

    document.getElementById('search').addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        e.target.value = '';
        currentFilter = '';
        applyFilters();
      }
    });

    // Keyboard shortcut for search
    document.addEventListener('keydown', e => {
      if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
        e.preventDefault();
        document.getElementById('search').focus();
      }
    });

    // Close modal on backdrop click
    document.getElementById('chart-modal').addEventListener('click', e => {
      if (e.target === document.getElementById('chart-modal')) closeChartModal();
    });

    // Escape to close modal
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && !document.getElementById('chart-modal').classList.contains('hidden')) {
        closeChartModal();
      }
    });

    // ============================================
    // INITIALIZATION
    // ============================================
    loadSymbols();
  </script>
</body>
</html>
