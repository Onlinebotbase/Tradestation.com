<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Select Holding Symbol - Trade Station</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{brand:{600:'#2563eb'},dark:{800:'#1f2937',900:'#111827',950:'#0b0f19'}}}}}</script>
  <style>body{background:#0b0f19;}</style>
</head>
<body class="text-white">
  <div id="ts-global-header"></div>
  <main class="pb-24 pt-2 px-4 max-w-lg mx-auto">
    <h1 class="text-lg font-bold mb-4">Select Symbol</h1>
    <input type="text" id="search" placeholder="Search A-Z..." class="w-full px-3 py-2 bg-dark-800 border border-gray-700 rounded-lg text-white text-sm mb-4 focus:outline-none focus:border-brand-600">
    <div id="symbol-list" class="space-y-2"></div>
  </main>
  <div id="ts-global-footer"></div>
  <script src="app.js"></script>
  <script>
    if (!TS_Auth.requireAuth()) throw new Error('Auth required');
    async function loadSymbols() {
      const coins = await TS_Market.getCoins();
      const list = document.getElementById('symbol-list');
      const search = document.getElementById('search');
      function render(filter = '') {
        const filtered = coins.filter(c => c.symbol.toLowerCase().includes(filter.toLowerCase()) || c.name.toLowerCase().includes(filter.toLowerCase()));
        list.innerHTML = filtered.map(c => `
          <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-3 flex items-center justify-between cursor-pointer hover:border-brand-500/50" onclick="selectSymbol('${c.symbol}', '${c.name.replace(/'/g, "\\'")}')">
            <div class="flex items-center gap-3">
              <img src="${c.image}" class="w-8 h-8 rounded-full" onerror="this.style.display='none'">
              <div><div class="text-sm font-bold text-white">${c.symbol.toUpperCase()}</div><div class="text-xs text-gray-400">${c.name}</div></div>
            </div>
            <div class="text-sm font-bold text-white">$${c.current_price ? c.current_price.toLocaleString() : '--'}</div>
          </div>
        `).join('');
      }
      search.addEventListener('input', e => render(e.target.value));
      render();
    }
    function selectSymbol(symbol, name) { TS_DB.set('holding_selected_symbol', { symbol, name }); location.href = 'holding-investment.html'; }
    loadSymbols();
  </script>
</body>
</html>
