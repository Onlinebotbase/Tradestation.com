<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bank Deposit - Trade Station</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{brand:{600:'#2563eb'},dark:{800:'#1f2937',900:'#111827',950:'#0b0f19'}}}}}</script>
  <style>body{background:#0b0f19;}</style>
</head>
<body class="text-white">
  <div id="ts-global-header"></div>
  <main class="pb-24 pt-2 px-4 max-w-lg mx-auto">
    <h1 class="text-lg font-bold mb-4">Bank Deposit</h1>
    <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-4 mb-4">
      <div class="text-xs text-gray-400 mb-1">Current Balance</div>
      <div class="text-2xl font-bold text-white" id="current-balance">$0.00</div>
    </div>
    <form id="deposit-form" class="space-y-4">
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1">Deposit Amount ($)</label>
        <input type="number" id="amount" required min="10" class="w-full px-3 py-2.5 bg-dark-800 border border-gray-700 rounded-lg text-white text-sm focus:outline-none focus:border-brand-600" placeholder="Min $10">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1">Bank Name</label>
        <input type="text" id="bankName" required class="w-full px-3 py-2.5 bg-dark-800 border border-gray-700 rounded-lg text-white text-sm" placeholder="Your bank name">
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1">Account Holder Name</label>
        <input type="text" id="holderName" required class="w-full px-3 py-2.5 bg-dark-800 border border-gray-700 rounded-lg text-white text-sm" placeholder="Full name on account">
      </div>
      <button type="submit" class="w-full py-3 bg-brand-600 hover:bg-brand-700 text-white font-bold rounded-xl transition-all">Continue</button>
    </form>
  </main>
  <div id="ts-global-footer"></div>
  <script src="app.js"></script>
  <script>
    if (!TS_Auth.requireAuth()) throw new Error('Auth required');
    document.getElementById('current-balance').textContent = '$' + TS_Balance.get().toFixed(2);
    document.getElementById('deposit-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const amount = parseFloat(document.getElementById('amount').value);
      if (!amount || amount < 10) { TS_UI.showToast('Minimum deposit is $10', 'warning'); return; }
      TS_DB.set('pending_deposit', { amount, bankName: document.getElementById('bankName').value, holderName: document.getElementById('holderName').value, method: 'bank' });
      location.href = 'deposit-bank-confirm.html';
    });
  </script>
</body>
</html>
