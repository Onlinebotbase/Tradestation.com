<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Notifications - Trade Station</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{brand:{600:'#2563eb'},dark:{800:'#1f2937',900:'#111827',950:'#0b0f19'}}}}}</script>
  <style>body{background:#0b0f19;}</style>
</head>
<body class="text-white">
  <div id="ts-global-header"></div>
  <main class="pb-24 pt-2 px-4 max-w-lg mx-auto">
    <div class="flex items-center justify-between mb-4">
      <h1 class="text-lg font-bold">Notifications</h1>
      <button onclick="TS_Notifications.clearAll(); renderNotifications();" class="text-xs text-red-400 font-medium">Clear All</button>
    </div>
    <div id="notifications-list" class="space-y-2"></div>
    <div id="no-notifications" class="hidden text-center py-12 text-gray-500 text-sm">
      <p>No notifications yet.</p>
    </div>
  </main>
  <div id="ts-global-footer"></div>
  <script src="app.js"></script>
  <script>
    if (!TS_Auth.requireAuth()) throw new Error('Auth required');
    function renderNotifications() {
      const notifs = TS_Notifications.getAll().filter(n => !n.dismissed);
      const list = document.getElementById('notifications-list');
      const noNotifs = document.getElementById('no-notifications');
      if (notifs.length === 0) { list.innerHTML = ''; noNotifs.classList.remove('hidden'); return; }
      noNotifs.classList.add('hidden');
      list.innerHTML = notifs.map(n => {
        const colors = { info: 'bg-blue-500/10 border-blue-500/20', success: 'bg-green-500/10 border-green-500/20', warning: 'bg-yellow-500/10 border-yellow-500/20', error: 'bg-red-500/10 border-red-500/20', market: 'bg-purple-500/10 border-purple-500/20' };
        const color = colors[n.type] || colors.info;
        return `
          <div class="${color} border rounded-xl p-4">
            <div class="flex items-start justify-between gap-2">
              <div class="flex-1">
                <div class="text-sm font-bold text-white mb-1">${n.title}</div>
                <div class="text-xs text-gray-300">${n.message}</div>
                <div class="text-xs text-gray-500 mt-1">${new Date(n.createdAt).toLocaleString()}</div>
              </div>
              <button onclick="TS_Notifications.dismiss('${n.id}'); renderNotifications();" class="p-1 text-gray-500 hover:text-white">✕</button>
            </div>
          </div>
        `;
      }).join('');
    }
    renderNotifications();
  </script>
</body>
</html>
