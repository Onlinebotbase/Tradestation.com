<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Withdraw - Trade Station</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{brand:{600:'#2563eb'},dark:{800:'#1f2937',900:'#111827',950:'#0b0f19'}}}}}</script>
  <style>body{background:#0b0f19;}</style>
</head>
<body class="text-white">
  <div id="ts-global-header"></div>
  <main class="pb-24 pt-2 px-4 max-w-lg mx-auto">
    <h1 class="text-lg font-bold mb-4">Withdraw Funds</h1>
    <div id="suspension-banner" class="hidden bg-red-500/10 border border-red-500/20 rounded-xl p-4 mb-4">
      <div class="text-sm text-red-400 font-bold mb-1">Withdrawal Suspended</div>
      <div class="text-xs text-red-300" id="suspension-timer">You have exceeded the maximum number of attempts. Please try again later.</div>
    </div>
    <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-4 mb-4">
      <div class="text-xs text-gray-400 mb-1">Available Balance</div>
      <div class="text-2xl font-bold text-white" id="avail-balance">$0.00</div>
    </div>
    <div class="space-y-3">
      <button onclick="location.href='withdraw-details.html?method=onchain'" id="btn-onchain" class="w-full bg-dark-800 border border-gray-700/50 rounded-xl p-4 flex items-center gap-4 hover:border-brand-500/50 transition-colors text-left">
        <div class="w-12 h-12 rounded-full bg-orange-500/10 flex items-center justify-center text-orange-400">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M16 12l-4-4-4 4"></path><path d="M12 16V8"></path></svg>
        </div>
        <div>
          <div class="text-sm font-bold text-white">On-Chain Transfer</div>
          <div class="text-xs text-gray-400">Withdraw to external crypto wallet</div>
        </div>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="ml-auto text-gray-500"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </button>
      <button onclick="TS_UI.showModal('Internal Transfer', 'Send funds to another Trade Station account by User ID.', [{text:'Cancel'},{text:'Proceed',primary:true,onClick:()=>TS_UI.showModal('Feature Coming Soon','Internal transfers will be available soon.',[{text:'OK',primary:true}])}])" class="w-full bg-dark-800 border border-gray-700/50 rounded-xl p-4 flex items-center gap-4 hover:border-brand-500/50 transition-colors text-left">
        <div class="w-12 h-12 rounded-full bg-blue-500/10 flex items-center justify-center text-blue-400">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        </div>
        <div>
          <div class="text-sm font-bold text-white">User Account Transfer</div>
          <div class="text-xs text-gray-400">Transfer to another Trade Station user</div>
        </div>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="ml-auto text-gray-500"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </button>
    </div>
  </main>
  <div id="ts-global-footer"></div>
  <script src="app.js"></script>
  <script>
    if (!TS_Auth.requireAuth()) throw new Error('Auth required');
    document.getElementById('avail-balance').textContent = '$' + TS_Balance.get().toFixed(2);
    if (TS_Withdraw.isSuspended()) {
      document.getElementById('suspension-banner').classList.remove('hidden');
      document.getElementById('btn-onchain').disabled = true;
      document.getElementById('btn-onchain').classList.add('opacity-50');
      const until = TS_Withdraw.getSuspensionTime();
      if (until) {
        function updateTimer() {
          const diff = until - new Date();
          if (diff <= 0) { location.reload(); return; }
          const h = Math.floor(diff / 3600000);
          const m = Math.floor((diff % 3600000) / 60000);
          const s = Math.floor((diff % 60000) / 1000);
          document.getElementById('suspension-timer').textContent = `Suspended for ${h}h ${m}m ${s}s`;
        }
        updateTimer();
        setInterval(updateTimer, 1000);
      }
    }
  </script>
</body>
</html>
