<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Withdrawal Processing - Trade Station</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{brand:{600:'#2563eb'},dark:{800:'#1f2937',900:'#111827',950:'#0b0f19'}}}}}</script>
  <style>body{background:#0b0f19;}</style>
</head>
<body class="text-white">
  <div id="ts-global-header"></div>
  <main class="pb-24 pt-2 px-4 max-w-lg mx-auto">
    <h1 class="text-lg font-bold mb-4">Processing Withdrawal</h1>
    <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-6 text-center mb-4">
      <div class="w-20 h-20 mx-auto mb-4 rounded-full bg-yellow-500/10 flex items-center justify-center">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-yellow-400 animate-spin"><circle cx="12" cy="12" r="10"></circle><path d="M12 6v6l4 2"></path></svg>
      </div>
      <div class="text-sm text-gray-300 mb-1">Your withdrawal is being processed</div>
      <div class="text-xs text-gray-500 mb-4">Estimated time: 24 hours</div>
      <div class="text-3xl font-mono font-bold text-white mb-2" id="countdown">24:00:00</div>
      <div class="w-full bg-gray-700 rounded-full h-2 mb-4"><div id="progress-bar" class="bg-brand-600 h-2 rounded-full transition-all" style="width: 0%"></div></div>
    </div>
    <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-4 mb-4 space-y-3">
      <div class="flex justify-between"><span class="text-sm text-gray-400">Amount</span><span class="text-sm font-bold text-white" id="p-amount">--</span></div>
      <div class="flex justify-between"><span class="text-sm text-gray-400">Address</span><span class="text-sm font-bold text-white font-mono truncate max-w-[150px]" id="p-address">--</span></div>
      <div class="flex justify-between"><span class="text-sm text-gray-400">Network</span><span class="text-sm font-bold text-white" id="p-network">--</span></div>
      <div class="flex justify-between"><span class="text-sm text-gray-400">Status</span><span class="text-sm font-bold text-yellow-400">Processing</span></div>
    </div>
    <button onclick="location.href='history.html'" class="w-full py-3 bg-gray-800 hover:bg-gray-700 text-white font-bold rounded-xl mb-3">View in History</button>
    <button onclick="TS_UI.showModal('Withdrawal Details', 'This withdrawal is subject to security verification and network confirmation times. You will receive an email notification once completed.', [{text:'OK',primary:true}])" class="w-full py-3 bg-dark-800 border border-gray-700 text-gray-300 font-bold rounded-xl">View Details</button>
  </main>
  <div id="ts-global-footer"></div>
  <script src="app.js"></script>
  <script>
    if (!TS_Auth.requireAuth()) throw new Error('Auth required');
    const processing = TS_DB.get('processing_withdraw', { amount: 0, address: '--', network: '--', startTime: Date.now() });
    document.getElementById('p-amount').textContent = '$' + processing.amount.toFixed(2);
    document.getElementById('p-address').textContent = processing.address;
    document.getElementById('p-network').textContent = processing.network;
    
    const TOTAL_TIME = 24 * 3600 * 1000; // 24 hours in ms
    const startTime = processing.startTime || Date.now();
    
    function updateCountdown() {
      const elapsed = Date.now() - startTime;
      const remaining = Math.max(0, TOTAL_TIME - elapsed);
      const hours = Math.floor(remaining / 3600000);
      const minutes = Math.floor((remaining % 3600000) / 60000);
      const seconds = Math.floor((remaining % 60000) / 1000);
      document.getElementById('countdown').textContent = `${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
      const pct = Math.min(100, (elapsed / TOTAL_TIME) * 100);
      document.getElementById('progress-bar').style.width = pct + '%';
      
      if (remaining <= 0) {
        // Complete withdrawal
        const txs = TS_DB.get('transactions', []);
        const tx = txs.find(t => t.type === 'withdraw' && t.status === 'processing');
        if (tx) { tx.status = 'completed'; TS_DB.set('transactions', txs); }
        TS_DB.remove('processing_withdraw');
        TS_UI.showModal('Withdrawal Complete', 'Your withdrawal has been successfully processed.', [{text:'View History',primary:true,onClick:()=>location.href='history.html'}]);
      }
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
