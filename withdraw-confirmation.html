<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Withdraw Confirmation - Trade Station</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{brand:{600:'#2563eb'},dark:{800:'#1f2937',900:'#111827',950:'#0b0f19'}}}}}</script>
  <style>body{background:#0b0f19;}</style>
</head>
<body class="text-white">
  <div id="ts-global-header"></div>
  <main class="pb-24 pt-2 px-4 max-w-lg mx-auto">
    <h1 class="text-lg font-bold mb-4">Confirm Withdrawal</h1>
    <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-4 mb-4 space-y-3">
      <div class="flex justify-between"><span class="text-sm text-gray-400">Amount</span><span class="text-sm font-bold text-white" id="w-amount">--</span></div>
      <div class="flex justify-between"><span class="text-sm text-gray-400">Address</span><span class="text-sm font-bold text-white font-mono truncate max-w-[150px]" id="w-address">--</span></div>
      <div class="flex justify-between"><span class="text-sm text-gray-400">Network</span><span class="text-sm font-bold text-white" id="w-network">--</span></div>
    </div>
    <div id="attempts-warning" class="hidden bg-yellow-500/10 border border-yellow-500/20 rounded-xl p-3 mb-4">
      <div class="text-xs text-yellow-400">Warning: <span id="attempts-left">5</span> attempts remaining before 48-hour suspension.</div>
    </div>
    <form id="confirm-form" class="space-y-4">
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1">6-Digit Validation Code</label>
        <input type="text" id="code" required maxlength="6" pattern="\d{6}" class="w-full px-3 py-2.5 bg-dark-800 border border-gray-700 rounded-lg text-white text-sm text-center text-2xl font-mono tracking-widest focus:outline-none focus:border-brand-600" placeholder="000000">
      </div>
      <button type="submit" class="w-full py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl">Submit Withdrawal</button>
    </form>
  </main>
  <div id="ts-global-footer"></div>
  <div id="loading-overlay" class="hidden fixed inset-0 z-[9999] flex flex-col items-center justify-center bg-black/90 backdrop-blur-sm">
    <div class="w-12 h-12 border-4 border-brand-500 border-t-transparent rounded-full animate-spin mb-4"></div>
    <p class="text-white font-medium">Processing withdrawal...</p>
  </div>
  <script src="app.js"></script>
  <script>
    if (!TS_Auth.requireAuth()) throw new Error('Auth required');
    const pending = TS_DB.get('pending_withdraw', { amount: 0, address: '--', network: '--' });
    document.getElementById('w-amount').textContent = '$' + pending.amount.toFixed(2);
    document.getElementById('w-address').textContent = pending.address;
    document.getElementById('w-network').textContent = pending.network;
    
    const attempts = TS_Withdraw.getAttempts();
    if (attempts > 0) {
      document.getElementById('attempts-warning').classList.remove('hidden');
      document.getElementById('attempts-left').textContent = Math.max(0, 5 - attempts);
    }
    
    document.getElementById('confirm-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const code = document.getElementById('code').value.trim();
      if (code.length !== 6 || !/^\d{6}$/.test(code)) { TS_UI.showToast('Enter a valid 6-digit code', 'warning'); return; }
      
      if (!TS_Withdraw.validateCode(code)) {
        const newAttempts = TS_Withdraw.addAttempt();
        if (newAttempts >= 5) {
          TS_UI.showToast('Too many failed attempts. Withdrawal suspended for 48 hours.', 'error');
          location.href = 'withdraw-options.html';
        } else {
          TS_UI.showToast(`Invalid code. ${5 - newAttempts} attempts remaining.`, 'error');
          document.getElementById('attempts-warning').classList.remove('hidden');
          document.getElementById('attempts-left').textContent = Math.max(0, 5 - newAttempts);
        }
        return;
      }
      
      document.getElementById('loading-overlay').classList.remove('hidden');
      setTimeout(() => {
        TS_DB.set('processing_withdraw', { ...pending, startTime: Date.now() });
        TS_Balance.subtract(pending.amount);
        const txs = TS_DB.get('transactions', []);
        txs.unshift({ type: 'withdraw', amount: pending.amount, address: pending.address, network: pending.network, status: 'processing', createdAt: new Date().toISOString() });
        TS_DB.set('transactions', txs);
        TS_DB.remove('pending_withdraw');
        location.href = 'withdraw-processing.html';
      }, 3000);
    });
  </script>
</body>
</html>
