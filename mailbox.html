<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mailbox - Trade Station</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brand: { 600: '#2563eb' }, dark: { 800: '#1f2937', 900: '#111827', 950: '#0b0f19' } } } } }</script>
  <style>body { background: #0b0f19; }</style>
</head>
<body class="text-white">
  <div id="ts-global-header"></div>
  <main class="pb-24 pt-2 px-4 max-w-lg mx-auto">
    <h1 class="text-lg font-bold mb-4">Messages & Support</h1>

    <!-- Smartsupp Chat Button -->
    <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-4 mb-4">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-full bg-brand-600 flex items-center justify-center">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        </div>
        <div>
          <div class="text-sm font-bold text-white">Live Chat Support</div>
          <div class="text-xs text-gray-400">Typically replies in under 5 minutes</div>
        </div>
      </div>
      <a href="https://www.smartsupp.com/widget/0aca269b6fb7319bc6e3d94fecac02732bdbdb3a" target="_blank" class="block w-full py-2.5 bg-brand-600 hover:bg-brand-700 text-white text-center font-bold rounded-lg text-sm transition-colors">Open Live Chat</a>
    </div>

    <!-- Message List -->
    <div class="mb-3">
      <h2 class="text-xs font-bold text-gray-400 uppercase mb-2">Recent Messages</h2>
      <div id="message-list" class="space-y-2">
        <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-4 flex items-center gap-3">
          <div class="w-10 h-10 rounded-full bg-green-500/10 flex items-center justify-center text-green-400">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
          </div>
          <div class="flex-1">
            <div class="text-sm font-bold text-white">Welcome to Trade Station</div>
            <div class="text-xs text-gray-400">Your account has been verified and is ready for trading.</div>
          </div>
          <span class="text-xs text-gray-500">Just now</span>
        </div>
        <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-4 flex items-center gap-3">
          <div class="w-10 h-10 rounded-full bg-blue-500/10 flex items-center justify-center text-blue-400">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
          </div>
          <div class="flex-1">
            <div class="text-sm font-bold text-white">Security Alert</div>
            <div class="text-xs text-gray-400">Enable two-factor authentication for enhanced security.</div>
          </div>
          <span class="text-xs text-gray-500">1h ago</span>
        </div>
      </div>
    </div>
  </main>
  <div id="ts-global-footer"></div>
  <script src="app.js"></script>
  <script>
    if (!TS_Auth.requireAuth()) throw new Error('Auth required');
  </script>
</body>
</html>
