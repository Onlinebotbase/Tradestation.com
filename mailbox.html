<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mailbox - Trade Station</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 600: '#2563eb', 700: '#1d4ed8' },
            dark: { 800: '#1a1d29', 900: '#0f111a', 950: '#0b0e17' },
            mt5: {
              bg: '#0f111a',
              panel: '#161922',
              border: '#2a2d3a',
              hover: '#1e2130',
              accent: '#3b82f6',
              success: '#22c55e',
              warning: '#f59e0b',
              danger: '#ef4444',
              text: '#e2e8f0',
              muted: '#94a3b8',
              subtle: '#64748b'
            }
          },
          fontFamily: {
            mono: ['SF Mono', 'Monaco', 'Inconsolata', 'monospace'],
            sans: ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body {
      background: #0b0e17;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e2e8f0;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 2px; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .animate-slide-in { animation: slideIn 0.25s ease-out forwards; }
    .animate-pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }
    .msg-item {
      transition: all 0.15s ease;
      cursor: pointer;
      position: relative;
    }
    .msg-item:hover {
      background: #1e2130;
      transform: translateX(2px);
    }
    .msg-item:active { transform: scale(0.995); }
    .msg-item.unread {
      background: rgba(59, 130, 246, 0.04);
      border-left: 3px solid #3b82f6;
    }
    .msg-item.unread .msg-subject {
      color: #fff;
      font-weight: 700;
    }
    .msg-item.selected {
      background: rgba(59, 130, 246, 0.12);
      border: 1px solid rgba(59, 130, 246, 0.3);
    }
    .tab-btn {
      transition: all 0.2s ease;
      position: relative;
    }
    .tab-btn.active {
      color: #3b82f6;
      background: rgba(59, 130, 246, 0.1);
    }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 20%;
      right: 20%;
      height: 2px;
      background: #3b82f6;
      border-radius: 1px;
    }
    .search-input {
      background: #1a1d29;
      border: 1px solid #2a2d3a;
      transition: all 0.2s ease;
    }
    .search-input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15);
      outline: none;
    }
    .compose-btn {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
      transition: all 0.2s ease;
    }
    .compose-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
    }
    .compose-btn:active { transform: translateY(0); }
    .bottom-nav-item {
      transition: all 0.15s ease;
    }
    .bottom-nav-item.active {
      color: #3b82f6;
    }
    .bottom-nav-item.active svg {
      filter: drop-shadow(0 0 4px rgba(59, 130, 246, 0.5));
    }
    .status-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .context-menu {
      position: absolute;
      background: #1e2130;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      z-index: 100;
      min-width: 160px;
      overflow: hidden;
      animation: fadeIn 0.15s ease-out;
    }
    .context-menu-item {
      padding: 10px 16px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.1s;
    }
    .context-menu-item:hover { background: #2a2d3a; }
    .context-menu-item.danger { color: #ef4444; }
    .context-menu-item.danger:hover { background: rgba(239, 68, 68, 0.1); }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease-out;
    }
    .modal-content {
      background: #161922;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      width: 90%;
      max-width: 480px;
      max-height: 80vh;
      overflow: hidden;
      animation: slideIn 0.25s ease-out;
    }
    .selection-mode .msg-item { padding-left: 48px; }
    .selection-checkbox {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      border: 2px solid #475569;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .selection-checkbox.checked {
      background: #3b82f6;
      border-color: #3b82f6;
    }
    .live-indicator {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #22c55e;
      font-weight: 600;
    }
    .live-dot {
      width: 6px;
      height: 6px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    .filter-chip {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      background: #1a1d29;
      border: 1px solid #2a2d3a;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-chip:hover {
      border-color: #475569;
      color: #e2e8f0;
    }
    .filter-chip.active {
      background: rgba(59, 130, 246, 0.15);
      border-color: #3b82f6;
      color: #3b82f6;
    }
    .skeleton {
      background: linear-gradient(90deg, #1a1d29 25%, #252a3a 50%, #1a1d29 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }
  </style>
</head>
<body class="text-white">

              <path d="M2 9.5V16.75C2 18.483 3.357 19.899 5.066 19.99C5.186 19.996 5.307 20 5.429 20H18.571C18.693 20 18.814 19.996 18.934 19.99C20.643 19.899 22 18.483 22 16.75V9.5L12.472 14.832C12.329 14.912 12.172 14.958 12 14.958C11.828 14.958 11.671 14.912 11.528 14.832L2 9.5Z" fill="rgba(255,255,255,0.3)"/>

        <div class="flex items-center gap-2">

    // ============================================

    function formatTime(isoString) {
      const date = new Date(isoString);
      const now = new Date();
      const diff = now - date;
      const minutes = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);
      if (minutes < 1) return 'Just now';
      if (minutes < 60) return minutes + 'm ago';
      if (hours < 24) return hours + 'h ago';
      if (days < 7) return days + 'd ago';
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function formatFullDate(isoString) {
      const date = new Date(isoString);
      return date.toLocaleString('en-US', {
        weekday: 'short',
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ============================================

    function renderMessageIcon(type) {
      const config = typeConfig[type] || typeConfig.system;
      const colors = colorMap[config.color];
      const iconSvg = SVGIcons[config.icon] || SVGIcons.info;
      return '<div class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0" style="background: ' + colors.bg + '; border: 1px solid ' + colors.border + ';"><div style="color: ' + colors.text + ';">' + iconSvg + '</div></div>';
    }

    function renderMessageItem(msg, index) {
      const config = typeConfig[msg.type] || typeConfig.system;
      const colors = colorMap[config.color];
      const isUnread = !msg.read;
      const isSelected = MailboxState.selectedIds.has(msg.id);
      const timeStr = formatTime(msg.timestamp);
      
      let html = '<div class="msg-item ' + (isUnread ? 'unread ' : '') + (isSelected ? 'selected ' : '') + 'bg-dark-800 border border-gray-700/30 rounded-xl p-3.5 flex items-start gap-3 animate-fade-in" style="animation-delay: ' + (index * 0.05) + 's" data-id="' + msg.id + '" onclick="handleMessageClick(event, \'' + msg.id + '\')" oncontextmenu="handleContextMenu(event, \'' + msg.id + '\')">';
      
      if (MailboxState.selectionMode) {
        html += '<div class="selection-checkbox ' + (isSelected ? 'checked' : '') + '" onclick="event.stopPropagation(); toggleSelection(\'' + msg.id + '\')">';
        if (isSelected) {
          html += '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
        }
        html += '</div>';
      }
      
      html += renderMessageIcon(msg.type);
      html += '<div class="flex-1 min-w-0">';
      html += '<div class="flex items-center justify-between gap-2 mb-0.5">';
      html += '<div class="msg-subject text-sm truncate ' + (isUnread ? 'text-white font-bold' : 'text-gray-300 font-medium') + '">' + escapeHtml(msg.subject) + '</div>';
      html += '<div class="flex items-center gap-1.5 flex-shrink-0">';
      if (msg.hasAttachment) {
        html += '<span class="text-gray-500">' + SVGIcons.paperclip + '</span>';
      }
      html += '<span class="text-xs text-gray-500 font-mono">' + timeStr + '</span>';
      if (isUnread) {
        html += '<span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse-dot"></span>';
      }
      html += '</div></div>';
      html += '<div class="text-xs text-gray-500 mb-1">' + escapeHtml(msg.sender) + '</div>';
      html += '<div class="text-xs text-gray-400 truncate leading-relaxed">' + escapeHtml(msg.preview) + '</div>';
      html += '</div>';
      html += '<div class="flex-shrink-0 self-center">' + SVGIcons.chevronRight + '</div>';
      html += '</div>';
      return html;
    }

    function renderMessageList() {
      const container = document.getElementById('message-list');

      let filtered = MailboxState.messages.filter(function(msg) {
        if (MailboxState.filter === 'unread') return !msg.read;
        if (MailboxState.filter === 'read') return msg.read;
        if (MailboxState.filter === 'sent') return msg.type === 'sent';
        if (MailboxState.filter === 'system') return msg.type === 'system';
        return true;
      });
      
      if (MailboxState.searchQuery) {
        const q = MailboxState.searchQuery.toLowerCase();
        filtered = filtered.filter(function(msg) {
          return msg.subject.toLowerCase().includes(q) ||
                 msg.sender.toLowerCase().includes(q) ||
                 msg.preview.toLowerCase().includes(q);
        });
      }
      
      filtered.sort(function(a, b) {
        const aTime = new Date(a.timestamp).getTime();
        const bTime = new Date(b.timestamp).getTime();
        return MailboxState.sortDesc ? bTime - aTime : aTime - bTime;
      });
      
      if (filtered.length === 0) {
        container.innerHTML = '';
        emptyState.classList.remove('hidden');
      } else {
        emptyState.classList.add('hidden');
        container.innerHTML = filtered.map(function(msg, i) {
          return renderMessageItem(msg, i);
        }).join('');
      }
      
      updateUnreadCount();
    }

    function renderMessageDetail(msg) {
      const config = typeConfig[msg.type] || typeConfig.system;
      const colors = colorMap[config.color];
      
      let html = '<div class="space-y-4">';
      html += '<div class="flex items-start gap-3">';
      html += renderMessageIcon(msg.type);
      html += '<div class="flex-1">';
      html += '<div class="text-sm font-bold text-white mb-0.5">' + escapeHtml(msg.subject) + '</div>';
      html += '<div class="text-xs text-gray-500">From: ' + escapeHtml(msg.sender) + ' &lt;' + escapeHtml(msg.senderEmail) + '&gt;</div>';
      html += '<div class="text-xs text-gray-500">To: ' + escapeHtml(msg.recipient) + '</div>';
      html += '<div class="text-xs text-gray-500 mt-1">' + formatFullDate(msg.timestamp) + '</div>';
      html += '</div></div>';
      
      html += '<div class="border-t border-gray-700/30 pt-4">';
      html += '<div class="text-sm text-gray-300 whitespace-pre-line leading-relaxed">' + escapeHtml(msg.body) + '</div>';
      html += '</div>';
      
      if (msg.hasAttachment) {
        html += '<div class="border-t border-gray-700/30 pt-4">';
        html += '<div class="text-xs text-gray-500 mb-2">Attachment</div>';
        html += '<div class="flex items-center gap-3 bg-dark-800 border border-gray-700/30 rounded-lg p-3">';
        html += '<div class="w-10 h-10 rounded-lg bg-red-500/10 flex items-center justify-center">';
        html += '<div style="color: #f87171;">' + SVGIcons.file + '</div>';
        html += '</div>';
        html += '<div class="flex-1">';
        html += '<div class="text-sm text-white font-medium">' + escapeHtml(msg.attachmentName) + '</div>';
        html += '<div class="text-xs text-gray-500">PDF Document</div>';
        html += '</div>';
        html += '<button class="p-2 rounded-lg hover:bg-dark-700 transition-colors" title="Download">';
        html += '<div class="text-gray-400">' + SVGIcons.download + '</div>';
        html += '</button>';
        html += '</div></div>';
      }
      
      html += '</div>';
      return html;
    }

    // ============================================
    // STATE UPDATES
    // ============================================
    function updateUnreadCount() {
      const count = MailboxState.messages.filter(function(m) { return !m.read; }).length;
      MailboxState.unreadCount = count;
      const badge = document.getElementById('unread-count');
      if (badge) {
        badge.textContent = count;
        badge.style.display = count > 0 ? 'inline-block' : 'none';
      }
    }

    function updateSelectionCount() {
      const count = MailboxState.selectedIds.size;
      const el = document.getElementById('selection-count');
      if (el) el.textContent = count + ' selected';
    }

    // ============================================
    // EVENT HANDLERS
    // ============================================
    function handleMessageClick(event, msgId) {
      if (MailboxState.selectionMode) {
        toggleSelection(msgId);
        return;
      }
      const msg = MailboxState.messages.find(function(m) { return m.id === msgId; });
      if (!msg) return;
      
      if (!msg.read) {
        msg.read = true;
        renderMessageList();
      }
      
      MailboxState.currentMessage = msg;
      document.getElementById('modal-body').innerHTML = renderMessageDetail(msg);
      document.getElementById('msg-modal').classList.remove('hidden');
    }

    function handleContextMenu(event, msgId) {
      event.preventDefault();
      const msg = MailboxState.messages.find(function(m) { return m.id === msgId; });
      if (!msg) return;
      
      const menu = document.getElementById('context-menu');
      const isUnread = !msg.read;
      
      menu.innerHTML = '';
      menu.innerHTML += '<div class="context-menu-item" onclick="markRead(\'' + msgId + '\'); hideContextMenu();">' + SVGIcons.markRead + '<span>Mark as ' + (isUnread ? 'read' : 'unread') + '</span></div>';
      menu.innerHTML += '<div class="context-menu-item" onclick="replyToMessage(\'' + msgId + '\'); hideContextMenu();">' + SVGIcons.reply + '<span>Reply</span></div>';
      menu.innerHTML += '<div class="context-menu-item" onclick="forwardMessage(\'' + msgId + '\'); hideContextMenu();">' + SVGIcons.forward + '<span>Forward</span></div>';
      menu.innerHTML += '<div class="context-menu-item" onclick="starMessage(\'' + msgId + '\'); hideContextMenu();">' + SVGIcons.star + '<span>Star</span></div>';
      menu.innerHTML += '<div class="context-menu-item danger" onclick="deleteMessage(\'' + msgId + '\'); hideContextMenu();">' + SVGIcons.trash + '<span>Delete</span></div>';
      
      menu.style.left = event.pageX + 'px';
      menu.style.top = event.pageY + 'px';
      menu.classList.remove('hidden');
    }

    function hideContextMenu() {
      document.getElementById('context-menu').classList.add('hidden');
    }

    function toggleSelection(msgId) {
      if (MailboxState.selectedIds.has(msgId)) {
        MailboxState.selectedIds.delete(msgId);
      } else {
        MailboxState.selectedIds.add(msgId);
      }
      updateSelectionCount();
      renderMessageList();
    }

    function markRead(msgId) {
      const msg = MailboxState.messages.find(function(m) { return m.id === msgId; });
      if (msg) {
        msg.read = !msg.read;
        renderMessageList();
        showToast(msg.read ? 'Marked as read' : 'Marked as unread', 'success');
      }
    }

    function deleteMessage(msgId) {
      const idx = MailboxState.messages.findIndex(function(m) { return m.id === msgId; });
      if (idx > -1) {
        MailboxState.messages.splice(idx, 1);
        renderMessageList();
        showToast('Message deleted', 'success');
        if (MailboxState.currentMessage && MailboxState.currentMessage.id === msgId) {
          closeModal();
        }
      }
    }

    function replyToMessage(msgId) {
      const msg = MailboxState.messages.find(function(m) { return m.id === msgId; });
      if (msg) {
        document.getElementById('compose-to').value = msg.senderEmail;
        document.getElementById('compose-subject').value = 'Re: ' + msg.subject;
        document.getElementById('compose-body').value = '';
        openComposeModal();
      }
    }

    function forwardMessage(msgId) {
      const msg = MailboxState.messages.find(function(m) { return m.id === msgId; });
      if (msg) {
        document.getElementById('compose-to').value = '';
        document.getElementById('compose-subject').value = 'Fwd: ' + msg.subject;
        document.getElementById('compose-body').value = '---------- Forwarded message ----------\\nFrom: ' + msg.sender + ' <' + msg.senderEmail + '>\\nDate: ' + formatFullDate(msg.timestamp) + '\\nSubject: ' + msg.subject + '\\n\\n' + msg.body;
        openComposeModal();
      }
    }

    function starMessage(msgId) {
      showToast('Message starred', 'success');
    }

    function closeModal() {
      document.getElementById('msg-modal').classList.add('hidden');
      MailboxState.currentMessage = null;
    }

    function openComposeModal() {
      document.getElementById('compose-modal').classList.remove('hidden');
    }

    function closeComposeModal() {
      document.getElementById('compose-modal').classList.add('hidden');
      document.getElementById('compose-to').value = '';
      document.getElementById('compose-subject').value = '';
      document.getElementById('compose-body').value = '';
    }

    function showToast(message, type) {
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toast-message');
      const toastIcon = document.getElementById('toast-icon');
      toastMsg.textContent = message;
      if (type === 'error') {
        toastIcon.innerHTML = '<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>';
        toastIcon.classList.remove('text-green-400');
        toastIcon.classList.add('text-red-400');
      } else {
        toastIcon.innerHTML = '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>';
        toastIcon.classList.remove('text-red-400');
        toastIcon.classList.add('text-green-400');
      }
      toast.classList.remove('hidden');
      setTimeout(function() {
        toast.classList.add('hidden');
      }, 3000);
    }

    // ============================================
    // BUTTON NAVIGATION FUNCTIONS - PRESERVED
    // ============================================
    function showPage(pageId) {
      const pages = document.querySelectorAll('.page');
      pages.forEach(function(page) {
        page.classList.add('hidden');
      });
      const target = document.getElementById(pageId);
      if (target) target.classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ============================================
    // LIVE SPREAD / REAL-TIME FUNCTIONS - PRESERVED
    // ============================================
    function loadLiveSpread() {
      console.log('Loading live spread data...');
    }

    function loadCharts() {
      console.log('Loading charts...');
    }

    // ============================================
    // INITIALIZATION
    // ============================================
    function initMailbox() {
      MailboxState.messages = JSON.parse(JSON.stringify(defaultMessages));
      renderMessageList();
      
      // Search toggle
      document.getElementById('btn-search-toggle').addEventListener('click', function() {
        const searchBar = document.getElementById('search-bar');
        searchBar.classList.toggle('hidden');
        if (!searchBar.classList.contains('hidden')) {
          document.getElementById('msg-search').focus();
        }
      });
      
      // Search input
      document.getElementById('msg-search').addEventListener('input', function(e) {
        MailboxState.searchQuery = e.target.value;
        document.getElementById('btn-clear-search').classList.toggle('hidden', !e.target.value);
        renderMessageList();
      });
      
      // Clear search
      document.getElementById('btn-clear-search').addEventListener('click', function() {
        document.getElementById('msg-search').value = '';
        MailboxState.searchQuery = '';
        this.classList.add('hidden');
        renderMessageList();
      });
      
      // Filter tabs
      document.querySelectorAll('.filter-chip').forEach(function(chip) {
        chip.addEventListener('click', function() {
          document.querySelectorAll('.filter-chip').forEach(function(c) { c.classList.remove('active'); });
          this.classList.add('active');
          MailboxState.filter = this.dataset.filter;
          renderMessageList();
        });
      });
      
      // Selection mode
      document.getElementById('btn-select-mode').addEventListener('click', function() {
        MailboxState.selectionMode = !MailboxState.selectionMode;
        if (!MailboxState.selectionMode) {
          MailboxState.selectedIds.clear();
        }
        document.getElementById('selection-toolbar').classList.toggle('hidden', !MailboxState.selectionMode);
        document.body.classList.toggle('selection-mode', MailboxState.selectionMode);
        updateSelectionCount();
        renderMessageList();
      });
      
      // Select all
      document.getElementById('btn-select-all').addEventListener('click', function() {
        const visibleIds = Array.from(document.querySelectorAll('.msg-item')).map(function(el) { return el.dataset.id; });
        if (MailboxState.selectedIds.size === visibleIds.length) {
          MailboxState.selectedIds.clear();
        } else {
          visibleIds.forEach(function(id) { MailboxState.selectedIds.add(id); });
        }
        updateSelectionCount();
        renderMessageList();
      });
      
      // Cancel selection
      document.getElementById('btn-cancel-select').addEventListener('click', function() {
        MailboxState.selectionMode = false;
        MailboxState.selectedIds.clear();
        document.getElementById('selection-toolbar').classList.add('hidden');
        document.body.classList.remove('selection-mode');
        renderMessageList();
      });
      
      // Mark selected as read
      document.getElementById('btn-mark-read').addEventListener('click', function() {
        MailboxState.selectedIds.forEach(function(id) {
          const msg = MailboxState.messages.find(function(m) { return m.id === id; });
          if (msg) msg.read = true;
        });
        MailboxState.selectionMode = false;
        MailboxState.selectedIds.clear();
        document.getElementById('selection-toolbar').classList.add('hidden');
        document.body.classList.remove('selection-mode');
        renderMessageList();
        showToast('Marked as read', 'success');
      });
      
      // Delete selected
      document.getElementById('btn-delete-selected').addEventListener('click', function() {
        MailboxState.messages = MailboxState.messages.filter(function(m) { return !MailboxState.selectedIds.has(m.id); });
        MailboxState.selectionMode = false;
        MailboxState.selectedIds.clear();
        document.getElementById('selection-toolbar').classList.add('hidden');
        document.body.classList.remove('selection-mode');
        renderMessageList();
        showToast('Messages deleted', 'success');
      });
      
      // Refresh
      document.getElementById('btn-refresh').addEventListener('click', function() {
        const btn = this;
        btn.querySelector('svg').style.animation = 'spin 1s linear infinite';
        setTimeout(function() {
          btn.querySelector('svg').style.animation = '';
          showToast('Messages refreshed', 'success');
        }, 1000);
      });
      
      // Sort
      document.getElementById('btn-sort').addEventListener('click', function() {
        MailboxState.sortDesc = !MailboxState.sortDesc;
        renderMessageList();
        showToast(MailboxState.sortDesc ? 'Sorted: Newest first' : 'Sorted: Oldest first', 'success');
      });
      
      // Load more
      document.getElementById('btn-load-more').addEventListener('click', function() {
        showToast('No more messages', 'info');
      });
      
      // Compose
      document.getElementById('btn-compose').addEventListener('click', openComposeModal);
      
      // Close modals
      document.getElementById('btn-close-modal').addEventListener('click', closeModal);
      document.getElementById('btn-close-compose').addEventListener('click', closeComposeModal);
      document.getElementById('msg-modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
      });
      document.getElementById('compose-modal').addEventListener('click', function(e) {
        if (e.target === this) closeComposeModal();
      });
      
      // Reply from modal
      document.getElementById('btn-reply').addEventListener('click', function() {
        if (MailboxState.currentMessage) {
          replyToMessage(MailboxState.currentMessage.id);
          closeModal();
        }
      });
      
      // Delete from modal
      document.getElementById('btn-delete-msg').addEventListener('click', function() {
        if (MailboxState.currentMessage) {
          deleteMessage(MailboxState.currentMessage.id);
          closeModal();
        }
      });
      
      // Send compose
      document.getElementById('btn-send').addEventListener('click', function() {
        const to = document.getElementById('compose-to').value;
        const subject = document.getElementById('compose-subject').value;
        const body = document.getElementById('compose-body').value;
        if (!to || !subject || !body) {
          showToast('Please fill in all fields', 'error');
          return;
        }
        const newMsg = {
          id: 'msg-' + Date.now(),
          subject: subject,
          sender: 'You',
          senderEmail: 'trader@tradestation.com',
          recipient: to,
          preview: body.substring(0, 100) + (body.length > 100 ? '...' : ''),
          body: body,
          timestamp: new Date().toISOString(),
          read: true,
          type: 'sent',
          status: 'sent',
          hasAttachment: false,
          threadId: null,
          priority: 'normal'
        };
        MailboxState.messages.unshift(newMsg);
        renderMessageList();
        closeComposeModal();
        showToast('Message sent successfully', 'success');
      });
      
      // Attach file
      document.getElementById('btn-attach').addEventListener('click', function() {
        showToast('Attachment feature coming soon', 'info');
      });
      
      // Hide context menu on click elsewhere
      document.addEventListener('click', function(e) {
        if (!e.target.closest('#context-menu')) {
          hideContextMenu();
        }
      });
      
      // Add spin keyframe
      const style = document.createElement('style');
      style.textContent = '@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }';
      document.head.appendChild(style);
    }

    // Start
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initMailbox);
    } else {
      initMailbox();
    }
  </script>
</body>
</html>
