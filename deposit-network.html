<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Select Network - Trade Station</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{brand:{600:'#2563eb'},dark:{800:'#1f2937',900:'#111827',950:'#0b0f19'}}}}}</script>
  <style>body{background:#0b0f19;}</style>
</head>
<body class="text-white">
  <div id="ts-global-header"></div>
  <main class="pb-24 pt-2 px-4 max-w-lg mx-auto">
    <h1 class="text-lg font-bold mb-4">Select Network</h1>
    <div id="network-list" class="space-y-3"></div>
  </main>
  <div id="ts-global-footer"></div>
  <script src="app.js"></script>
  <script>
    if (!TS_Auth.requireAuth()) throw new Error('Auth required');
    const coin = TS_DB.get('deposit_coin', { symbol: 'USDT' });
    const networks = {
      USDT: [
        { name: 'Ethereum (ERC-20)', address: '0xAB98294614C46008cBF82Fa3e25285FBC2A6F257' },
        { name: 'Tron (TRC-20)', address: 'TSt7yoNwGYRbtMMfkSAHE6dPs1cd9rxcco' },
        { name: 'BSC (BEP-20)', address: '0xAB98294614C46008cBF82Fa3e25285FBC2A6F257' }
      ],
      ETH: [{ name: 'Ethereum (ERC-20)', address: '0xAB98294614C46008cBF82Fa3e25285FBC2A6F257' }],
      BNB: [{ name: 'BNB Smart Chain (BEP-20)', address: '0xAB98294614C46008cBF82Fa3e25285FBC2A6F257' }],
      TRX: [{ name: 'Tron (TRC-20)', address: 'TSt7yoNwGYRbtMMfkSAHE6dPs1cd9rxcco' }]
    };
    const coinNetworks = networks[coin.symbol] || networks['USDT'];
    document.getElementById('network-list').innerHTML = coinNetworks.map((n, i) => `
      <button onclick="selectNetwork(${i})" class="w-full bg-dark-800 border border-gray-700/50 rounded-xl p-4 flex items-center gap-4 hover:border-brand-500/50 transition-colors text-left">
        <div class="w-10 h-10 rounded-full bg-gray-700 flex items-center justify-center text-white font-bold text-xs">${n.name[0]}</div>
        <div><div class="text-sm font-bold text-white">${n.name}</div><div class="text-xs text-gray-400 font-mono truncate max-w-[200px]">${n.address}</div></div>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="ml-auto text-gray-500"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </button>
    `).join('');
    function selectNetwork(idx) {
      TS_DB.set('deposit_network', coinNetworks[idx]);
      location.href = 'deposit-address.html';
    }
  </script>
</body>
</html>
