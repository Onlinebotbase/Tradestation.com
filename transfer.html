<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Transfer - Trade Station</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{brand:{600:'#2563eb'},dark:{800:'#1f2937',900:'#111827',950:'#0b0f19'}}}}}</script>
  <style>body{background:#0b0f19;}</style>
</head>
<body class="text-white">
  <div id="ts-global-header"></div>
  <main class="pb-24 pt-2 px-4 max-w-lg mx-auto">
    <h1 class="text-lg font-bold mb-4">Transfer Funds</h1>
    <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-4 mb-4">
      <div class="text-xs text-gray-400 mb-1">Available Balance</div>
      <div class="text-2xl font-bold text-white" id="avail-balance">$0.00</div>
    </div>
    <form id="transfer-form" class="space-y-4">
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1">Amount ($)</label>
        <div class="flex gap-2">
          <input type="number" id="amount" required min="1" class="flex-1 px-3 py-2.5 bg-dark-800 border border-gray-700 rounded-lg text-white text-sm focus:outline-none focus:border-brand-600" placeholder="Enter amount">
          <button type="button" onclick="document.getElementById('amount').value = TS_Balance.get().toFixed(2)" class="px-3 py-2 bg-gray-700 text-white text-xs font-bold rounded-lg">Max</button>
        </div>
      </div>
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1">Transfer To</label>
        <select id="destination" class="w-full px-3 py-2.5 bg-dark-800 border border-gray-700 rounded-lg text-white text-sm focus:outline-none focus:border-brand-600">
          <option value="holdings">Holding Investments</option>
          <option value="trading">Trading Account</option>
        </select>
      </div>
      <button type="submit" class="w-full py-3 bg-brand-600 hover:bg-brand-700 text-white font-bold rounded-xl transition-all">Confirm Transfer</button>
    </form>
  </main>
  <div id="ts-global-footer"></div>
  <div id="loading-overlay" class="hidden fixed inset-0 z-[9999] flex flex-col items-center justify-center bg-black/90 backdrop-blur-sm">
    <div class="w-12 h-12 border-4 border-brand-500 border-t-transparent rounded-full animate-spin mb-4"></div>
    <p class="text-white font-medium">Processing transfer...</p>
  </div>
  <script src="app.js"></script>
  <script>
    if (!TS_Auth.requireAuth()) throw new Error('Auth required');
    document.getElementById('avail-balance').textContent = '$' + TS_Balance.get().toFixed(2);
    document.getElementById('transfer-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const amount = parseFloat(document.getElementById('amount').value);
      if (!amount || amount <= 0) { TS_UI.showToast('Enter a valid amount', 'warning'); return; }
      if (amount > TS_Balance.get()) { TS_UI.showToast('Insufficient balance', 'error'); return; }
      document.getElementById('loading-overlay').classList.remove('hidden');
      setTimeout(() => {
        TS_Balance.subtract(amount);
        const txs = TS_DB.get('transactions', []);
        txs.unshift({ type: 'transfer', amount, method: document.getElementById('destination').value, status: 'completed', createdAt: new Date().toISOString() });
        TS_DB.set('transactions', txs);
        TS_UI.showToast('Transfer completed successfully', 'success');
        location.href = 'dashboard.html';
      }, 3000);
    });
  </script>
</body>
</html>
