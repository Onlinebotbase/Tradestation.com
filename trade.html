<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Trades - Trade Station</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brand: { 600: '#2563eb' }, dark: { 800: '#1f2937', 900: '#111827', 950: '#0b0f19' } } } } }</script>
  <style>body { background: #0b0f19; }</style>
</head>
<body class="text-white">
  <div id="ts-global-header"></div>
  <main class="pb-24 pt-2 px-4 max-w-lg mx-auto">
    <div class="flex items-center justify-between mb-4">
      <h1 class="text-lg font-bold">Active Trades</h1>
      <button onclick="location.href='order-ticket.html'" class="px-3 py-1.5 bg-brand-600 text-white text-xs font-bold rounded-lg">+ New Trade</button>
    </div>
    <div id="trades-container" class="space-y-3"></div>
    <div id="no-trades" class="hidden text-center py-12">
      <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-gray-800 flex items-center justify-center">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-gray-500"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
      </div>
      <p class="text-gray-500 text-sm mb-2">No active trades</p>
      <button onclick="location.href='order-ticket.html'" class="text-brand-400 text-sm font-semibold">Place your first trade</button>
    </div>
  </main>
  <div id="ts-global-footer"></div>
  <script src="app.js"></script>
  <script>
    if (!TS_Auth.requireAuth()) throw new Error('Auth required');

    function renderTrades() {
      const trades = TS_Invest.getTrades();
      const active = trades.filter(t => t.status === 'active');
      const container = document.getElementById('trades-container');
      const noTrades = document.getElementById('no-trades');

      if (active.length === 0) { container.innerHTML = ''; noTrades.classList.remove('hidden'); return; }
      noTrades.classList.add('hidden');

      container.innerHTML = active.map(t => {
        const liveVal = TS_Invest.calculateLiveValue(t);
        const profit = liveVal - t.amount;
        const profitPct = (profit / t.amount) * 100;
        const profitClass = profit >= 0 ? 'text-green-400' : 'text-red-400';
        const now = Date.now();
        const end = new Date(t.endDate).getTime();
        const remaining = Math.max(0, end - now);
        const days = Math.floor(remaining / 86400000);
        const hours = Math.floor((remaining % 86400000) / 3600000);

        return `
          <div class="bg-dark-800 border border-gray-700/50 rounded-xl p-4">
            <div class="flex items-center justify-between mb-3">
              <div class="flex items-center gap-2">
                <span class="text-sm font-bold text-white">${t.symbol.toUpperCase()}</span>
                <span class="text-xs px-2 py-0.5 rounded bg-gray-700 text-gray-300">${t.direction.toUpperCase()}</span>
                <span class="text-xs px-2 py-0.5 rounded bg-gray-700 text-gray-300">${t.orderType}</span>
              </div>
              <span class="text-xs text-gray-400">${days}d ${hours}h left</span>
            </div>
            <div class="grid grid-cols-3 gap-4 mb-3">
              <div>
                <div class="text-xs text-gray-400">Invested</div>
                <div class="text-sm font-bold text-white">$${t.amount.toFixed(2)}</div>
              </div>
              <div>
                <div class="text-xs text-gray-400">Current</div>
                <div class="text-sm font-bold ${profitClass}">$${liveVal.toFixed(2)}</div>
              </div>
              <div>
                <div class="text-xs text-gray-400">Return</div>
                <div class="text-sm font-bold ${profitClass}">${profit >= 0 ? '+' : ''}${profitPct.toFixed(2)}%</div>
              </div>
            </div>
            <div class="flex gap-2">
              <button onclick="closeTrade('${t.id}')" class="flex-1 py-2 bg-gray-700 hover:bg-gray-600 text-white text-xs font-bold rounded-lg">Close Trade</button>
              <button onclick="location.href='charts.html'" class="px-3 py-2 bg-gray-700 hover:bg-gray-600 text-white text-xs font-bold rounded-lg">Chart</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function closeTrade(id) {
      TS_UI.showModal('Close Trade', 'Are you sure you want to close this trade?', [
        { text: 'Cancel', onClick: () => {} },
        { text: 'Close', primary: true, onClick: () => {
          let trades = TS_Invest.getTrades();
          const idx = trades.findIndex(t => t.id === id);
          if (idx >= 0) {
            trades[idx].status = 'completed';
            trades[idx].profit = TS_Invest.calculateLiveValue(trades[idx]) - trades[idx].amount;
            TS_Invest.saveTrades(trades);
            const total = trades[idx].amount + trades[idx].profit;
            TS_Balance.add(total);
            TS_UI.showToast('Trade closed. Profit added to balance.', 'success');
            renderTrades();
          }
        }}
      ]);
    }

    renderTrades();
    setInterval(renderTrades, 1000);
  </script>
</body>
</html>
